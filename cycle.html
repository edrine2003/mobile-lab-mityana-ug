<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycle Tracker</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f1f5f9;
}

/* HEADER */
header{
  background:#ec4899;
  color:#fff;
  text-align:center;
  padding:15px;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* INPUT CARD */
.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#ec4899;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* RESULTS */
.results{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}

/* CALENDAR */
.calendar{
  margin-top:20px;
}

.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.day{
  padding:10px;
  text-align:center;
  background:#fff;
  border-radius:6px;
  font-size:12px;
}

/* COLORS */
.period{background:#f87171;color:#fff;}
.ovulation{background:#f472b6;color:#fff;}
.fertile{background:#fde68a;}
.safe{background:#bbf7d0;}

.legend{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
  font-size:12px;
}
.legend span{
  padding:5px 10px;
  border-radius:6px;
}
</style>

</head>

<body>

<header>
<h2>🩸 Cycle Tracker</h2>
</header>

<div class="container">

<div class="card">
<label>Last Period Date</label>
<input type="date" id="lastPeriod">

<label>Cycle Length</label>
<input type="number" id="cycleLength" value="28">

<label>Period Duration</label>
<input type="number" id="periodDuration" value="5">

<button onclick="calculate()">Calculate Cycle</button>
</div>

<div id="output"></div>

</div>

<script>

function calculate(){

const last = new Date(document.getElementById("lastPeriod").value);
const cycle = parseInt(document.getElementById("cycleLength").value);
const periodDays = parseInt(document.getElementById("periodDuration").value);

// Save data
localStorage.setItem("cycleData", JSON.stringify({
last, cycle, periodDays
}));

// Next period
const nextPeriod = new Date(last);
nextPeriod.setDate(last.getDate() + cycle);

// Ovulation
const ovulation = new Date(last);
ovulation.setDate(last.getDate() + (cycle - 14));

// Fertile window
const fertileStart = new Date(ovulation);
fertileStart.setDate(ovulation.getDate() - 5);

// Build UI
let html = `
<div class="results">
<h3>📊 Results</h3>
<p>🔴 Next Period: <b>${nextPeriod.toDateString()}</b></p>
<p>🌸 Ovulation: <b>${ovulation.toDateString()}</b></p>
<p>⚠️ Fertile: <b>${fertileStart.toDateString()} → ${ovulation.toDateString()}</b></p>
</div>

<div class="calendar">
<h3>📅 Calendar</h3>
<div class="calendar-grid">
`;

// Build 30-day calendar
for(let i=0;i<30;i++){

let d = new Date(last);
d.setDate(last.getDate()+i);

let cls="safe";

// Period days
if(i < periodDays) cls="period";

// Fertile
if(d >= fertileStart && d <= ovulation) cls="fertile";

// Ovulation
if(d.toDateString() === ovulation.toDateString()) cls="ovulation";

html += `<div class="day ${cls}">${d.getDate()}</div>`;
}

html += `
</div>

<div class="legend">
<span class="period">Period</span>
<span class="ovulation">Ovulation</span>
<span class="fertile">Fertile</span>
<span class="safe">Safe</span>
</div>
</div>
`;

document.getElementById("output").innerHTML = html;

}

// LOAD SAVED DATA
window.onload = () => {
const saved = JSON.parse(localStorage.getItem("cycleData"));
if(saved){
document.getElementById("lastPeriod").value = saved.last.split("T")[0];
document.getElementById("cycleLength").value = saved.cycle;
document.getElementById("periodDuration").value = saved.periodDays;
calculate();
}
};

</script>

</body>
</html>
