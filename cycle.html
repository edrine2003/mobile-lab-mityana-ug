<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycle Tracker</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f1f5f9;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#ec4899,#f472b6);
  color:#fff;
  text-align:center;
  padding:18px;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card{
  background:#fff;
  padding:20px;
  border-radius:14px;
  box-shadow:0 6px 14px rgba(0,0,0,0.1);
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

/* BUTTON */
button{
  background:linear-gradient(135deg,#ec4899,#f472b6);
  color:white;
  border:none;
  padding:14px;
  width:100%;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

/* RESULTS */
.results{
  background:linear-gradient(135deg,#fce7f3,#fff);
  border-radius:16px;
  padding:20px;
  margin-top:15px;
}

.results h2{
  color:#ec4899;
}

/* CALENDAR */
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.day{
  padding:12px;
  text-align:center;
  border-radius:8px;
  font-size:12px;
  background:#fff;
}

/* COLORS */
.period{background:#f87171;color:#fff;}
.ovulation{background:#ec4899;color:#fff;}
.fertile{background:#fde68a;}
.safe{background:#bbf7d0;}

.legend{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
  font-size:12px;
}

.legend span{
  padding:6px 10px;
  border-radius:6px;
}

</style>
</head>

<body>

<header>
<h2>🩸 Cycle Tracker</h2>
<p>Understand your body better 💖</p>
</header>

<div class="container">

<div class="card">
<label>Last Period Date</label>
<input type="date" id="lastPeriod">

<label>Cycle Length (days)</label>
<input type="number" id="cycleLength" value="28">

<label>Period Duration (days)</label>
<input type="number" id="periodDuration" value="5">

<button onclick="calculate()">Track My Cycle</button>
</div>

<div id="output"></div>

</div>

<script>

/* 🔥 PHASE LOGIC (FLO STYLE) */
function getPhase(today, last, cycle){

const diff = Math.floor((today - last)/(1000*60*60*24));
const day = diff % cycle;

if(day <= 5){
return {
phase:"🩸 Period Phase",
msg:"Your period is ongoing. Your body needs rest.",
tips:["Drink warm fluids","Eat iron-rich foods","Get enough rest"]
};
}

if(day <= 13){
return {
phase:"🌿 Follicular Phase",
msg:"Energy is rising. Great time to focus and be productive.",
tips:["Exercise lightly","Start new tasks","Stay active"]
};
}

if(day <= 16){
return {
phase:"🌸 Ovulation Phase",
msg:"High fertility window. You may feel more confident.",
tips:["Stay hydrated","Socialize","Track body signals"]
};
}

return {
phase:"🌙 Luteal Phase",
msg:"Your body is preparing for the next cycle.",
tips:["Avoid stress","Eat healthy","Get good sleep"]
};
}

/* 🔥 MAIN FUNCTION */
function calculate(){

const last = new Date(document.getElementById("lastPeriod").value);
const cycle = parseInt(document.getElementById("cycleLength").value);
const periodDays = parseInt(document.getElementById("periodDuration").value);

if(!last){
alert("Please select your last period date");
return;
}

/* SAVE */
localStorage.setItem("cycleData", JSON.stringify({
last: last.toISOString(),
cycle,
periodDays
}));

/* CALCULATIONS */
const nextPeriod = new Date(last);
nextPeriod.setDate(last.getDate() + cycle);

const ovulation = new Date(last);
ovulation.setDate(last.getDate() + (cycle - 14));

const fertileStart = new Date(ovulation);
fertileStart.setDate(ovulation.getDate() - 5);

const today = new Date();
const phaseData = getPhase(today, last, cycle);

/* UI */
let html = `
<div class="results">

<h3>💖 Your Body Today</h3>
<h2>${phaseData.phase}</h2>
<p>${phaseData.msg}</p>

<ul>
${phaseData.tips.map(t=>`<li>${t}</li>`).join("")}
</ul>

<hr>

<p>🔴 Next Period: <b>${nextPeriod.toDateString()}</b></p>
<p>🌸 Ovulation: <b>${ovulation.toDateString()}</b></p>
<p>⚠️ Fertile Window: <b>${fertileStart.toDateString()} → ${ovulation.toDateString()}</b></p>

</div>

<h3>📅 Cycle Calendar</h3>
<div class="calendar-grid">
`;

/* CALENDAR */
for(let i=0;i<30;i++){

let d = new Date(last);
d.setDate(last.getDate()+i);

let cls="safe";

if(i < periodDays) cls="period";

if(d >= fertileStart && d <= ovulation) cls="fertile";

if(d.toDateString() === ovulation.toDateString()) cls="ovulation";

html += `<div class="day ${cls}">${d.getDate()}</div>`;
}

html += `
</div>

<div class="legend">
<span class="period">Period</span>
<span class="ovulation">Ovulation</span>
<span class="fertile">Fertile</span>
<span class="safe">Safe</span>
</div>
`;

document.getElementById("output").innerHTML = html;

}

/* LOAD SAVED DATA */
window.onload = () => {
const saved = JSON.parse(localStorage.getItem("cycleData"));

if(saved){
document.getElementById("lastPeriod").value = saved.last.split("T")[0];
document.getElementById("cycleLength").value = saved.cycle;
document.getElementById("periodDuration").value = saved.periodDays;
calculate();
}
};

</script>

</body>
</html>
