<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile – Mobile Lab</title>
<meta name="theme-color" content="#0ea5e9">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<style>
:root{--primary:#0ea5e9;--primary2:#14b8a6;--dark:#0f172a;--muted:#64748b;--border:rgba(0,0,0,0.08);--bg:#f1f5f9;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',Arial,sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;padding-bottom:48px;}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,#0369a1,#0ea5e9,#14b8a6);background-size:300% 300%;animation:gradShift 8s ease infinite;padding:16px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.15);}
@keyframes gradShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.back-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:800;text-decoration:none;}
.topbar-title{color:#fff;font-size:18px;font-weight:900;flex:1;text-align:center;}

/* HERO */
.profile-hero{background:linear-gradient(135deg,#0369a1,#0ea5e9);padding:28px 20px 48px;text-align:center;color:#fff;position:relative;}
.profile-hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:32px;background:var(--bg);border-radius:32px 32px 0 0;}
.avatar-wrap{position:relative;display:inline-block;margin-bottom:12px;}
.avatar-img{width:96px;height:96px;border-radius:50%;border:4px solid rgba(255,255,255,0.7);object-fit:cover;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:#fff;overflow:hidden;}
.avatar-img img{width:96px;height:96px;border-radius:50%;object-fit:cover;}
.avatar-edit{position:absolute;bottom:2px;right:2px;width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary2));border:2px solid #fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;}
.profile-name{font-size:20px;font-weight:900;margin-bottom:4px;}
.profile-email{font-size:13px;opacity:0.85;font-weight:600;}
.patient-id{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:rgba(255,255,255,0.18);border-radius:999px;padding:6px 14px;font-size:13px;font-weight:800;border:1px solid rgba(255,255,255,0.3);}

/* WALLET CARD */
.wallet-bar{margin:16px;background:linear-gradient(135deg,var(--primary),var(--primary2));border-radius:18px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;color:#fff;box-shadow:0 8px 24px rgba(14,165,233,0.3);cursor:pointer;}
.wallet-bar-left .lbl{font-size:12px;font-weight:700;opacity:0.85;}
.wallet-bar-left .val{font-size:22px;font-weight:900;}
.wallet-bar-right{font-size:22px;}

/* SECTION */
.section{background:#fff;border-radius:20px;margin:0 16px 14px;padding:18px 20px;box-shadow:0 4px 14px rgba(0,0,0,0.05);border:1px solid var(--border);}
.section-title{font-size:14px;font-weight:900;color:var(--dark);margin-bottom:14px;display:flex;align-items:center;gap:8px;}

/* FIELDS */
.field{margin-bottom:14px;}
.field label{font-size:13px;font-weight:800;color:var(--dark);display:block;margin-bottom:5px;}
.field input,.field select{width:100%;padding:12px 14px;border-radius:14px;border:1.5px solid var(--border);background:#f8fafc;font-family:'Nunito',Arial,sans-serif;font-size:14px;font-weight:600;color:var(--dark);outline:none;transition:all 0.2s;}
.field input:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(14,165,233,0.1);background:#fff;}
.field input:disabled{background:#f1f5f9;color:var(--muted);cursor:not-allowed;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){.grid2{grid-template-columns:1fr;}}

/* BUTTONS */
.save-btn{width:100%;padding:15px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;font-size:16px;font-weight:900;cursor:pointer;font-family:'Nunito',Arial,sans-serif;box-shadow:0 6px 20px rgba(14,165,233,0.3);transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.save-btn:hover{transform:translateY(-2px);}
.save-btn:disabled{opacity:0.7;cursor:not-allowed;transform:none;}
.save-spinner{width:18px;height:18px;border-radius:50%;border:3px solid rgba(255,255,255,0.4);border-top-color:#fff;animation:spin 0.7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.save-btn.loading .btn-text{display:none;}
.save-btn.loading .save-spinner{display:block;}

/* DANGER ZONE */
.danger-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f8fafc;}
.danger-item:last-child{border-bottom:none;}
.danger-item-left h4{font-size:14px;font-weight:800;color:var(--dark);}
.danger-item-left p{font-size:12px;font-weight:600;color:var(--muted);margin-top:2px;}
.danger-btn{padding:8px 16px;border:none;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',Arial,sans-serif;transition:all 0.2s;}
.btn-orange{background:rgba(245,158,11,0.1);color:#b45309;border:1.5px solid rgba(245,158,11,0.3);}
.btn-red{background:rgba(239,68,68,0.08);color:#b91c1c;border:1.5px solid rgba(239,68,68,0.2);}
.btn-orange:hover{background:rgba(245,158,11,0.2);}
.btn-red:hover{background:rgba(239,68,68,0.15);}

/* TOAST */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--dark);color:#fff;padding:12px 24px;border-radius:999px;font-size:14px;font-weight:700;z-index:300;opacity:0;transition:all 0.3s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* PWD MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:28px 28px 0 0;padding:24px 20px 36px;width:100%;max-width:500px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:#e2e8f0;border-radius:999px;margin:0 auto 20px;}
.modal h3{font-size:18px;font-weight:900;color:var(--dark);margin-bottom:16px;}
.modal label{font-size:13px;font-weight:800;color:var(--dark);display:block;margin-bottom:6px;}
.modal input{width:100%;padding:12px 14px;border-radius:14px;border:1.5px solid var(--border);font-family:'Nunito',Arial,sans-serif;font-size:14px;font-weight:600;color:var(--dark);background:#f8fafc;outline:none;margin-bottom:14px;}
.modal input:focus{border-color:var(--primary);}
.modal-btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;font-size:15px;font-weight:900;cursor:pointer;font-family:'Nunito',Arial,sans-serif;box-shadow:0 6px 18px rgba(14,165,233,0.3);}
#photoInput{display:none;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- PWD MODAL -->
<div class="modal-overlay" id="pwdModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>🔐 Change Password</h3>
    <label>Current Password</label>
    <input type="password" id="currentPwd" placeholder="Enter current password">
    <label>New Password</label>
    <input type="password" id="newPwd" placeholder="Min 6 characters">
    <label>Confirm New Password</label>
    <input type="password" id="confirmPwd" placeholder="Repeat new password">
    <button class="modal-btn" onclick="changePassword()">✅ Update Password</button>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <a class="back-btn" href="dashboard.html">← Back</a>
  <div class="topbar-title">👤 My Profile</div>
  <div style="width:70px;"></div>
</div>

<!-- HERO -->
<div class="profile-hero">
  <div class="avatar-wrap">
    <div class="avatar-img" id="avatarEl">👤</div>
    <div class="avatar-edit" onclick="document.getElementById('photoInput').click()" title="Change photo">📷</div>
    <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(this)">
  </div>
  <div class="profile-name" id="heroName">Loading...</div>
  <div class="profile-email" id="heroEmail"></div>
  <div class="patient-id" id="heroPatientId" style="display:none;">🆔 <span id="patientIdText">—</span></div>
</div>

<!-- WALLET BAR -->
<div class="wallet-bar" onclick="window.location.href='wallet.html'">
  <div class="wallet-bar-left">
    <div class="lbl">💳 Wallet Balance</div>
    <div class="val" id="walletBal">UGX 0</div>
  </div>
  <div class="wallet-bar-right">›</div>
</div>

<!-- PERSONAL INFO -->
<div class="section">
  <div class="section-title">👤 Personal Information</div>
  <div class="field">
    <label>Full Name</label>
    <input type="text" id="fullName" placeholder="Your full name">
  </div>
  <div class="grid2">
    <div class="field">
      <label>Sex</label>
      <select id="sex">
        <option value="">-- Select --</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
    </div>
    <div class="field">
      <label>Date of Birth</label>
      <input type="date" id="dob" onchange="calcAge()">
    </div>
  </div>
  <div class="grid2">
    <div class="field">
      <label>Age</label>
      <input type="number" id="age" readonly style="background:#f1f5f9;color:var(--muted);">
    </div>
    <div class="field">
      <label>Nationality</label>
      <select id="nationality">
        <option value="">-- Select --</option>
        <option>Ugandan</option>
        <option>Other</option>
      </select>
    </div>
  </div>
</div>

<!-- CONTACT INFO -->
<div class="section">
  <div class="section-title">📞 Contact Information</div>
  <div class="field">
    <label>Phone (WhatsApp)</label>
    <input type="tel" id="phone" placeholder="07XXXXXXXX">
  </div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" disabled>
  </div>
  <div class="field">
    <label>Location / Address</label>
    <input type="text" id="address" placeholder="e.g. Mityana Town, near market">
  </div>
</div>

<!-- SAVE BUTTON -->
<div style="margin:0 16px 14px;">
  <button class="save-btn" id="saveBtn" onclick="saveProfile()">
    <span class="btn-text">💾 Save Changes</span>
    <div class="save-spinner"></div>
  </button>
</div>

<!-- ACCOUNT SETTINGS -->
<div class="section">
  <div class="section-title">⚙️ Account Settings</div>
  <div class="danger-item">
    <div class="danger-item-left">
      <h4>🔐 Change Password</h4>
      <p>Update your login password</p>
    </div>
    <button class="danger-btn btn-orange" onclick="document.getElementById('pwdModal').classList.add('open')">Change</button>
  </div>
  <div class="danger-item">
    <div class="danger-item-left">
      <h4>🚪 Sign Out</h4>
      <p>Log out of your account</p>
    </div>
    <button class="danger-btn btn-orange" onclick="signOut()">Logout</button>
  </div>
  <div class="danger-item">
    <div class="danger-item-left">
      <h4>🗑️ Delete Account</h4>
      <p>Permanently remove your account</p>
    </div>
    <button class="danger-btn btn-red" onclick="deleteAccount()">Delete</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyA4II_I1weZZGzP990t9UWJCXjuK932pdY",
  authDomain:"mobile-lab-mityana-aeae2.firebaseapp.com",
  projectId:"mobile-lab-mityana-aeae2",
  storageBucket:"mobile-lab-mityana-aeae2.firebasestorage.app"
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let userId = null;
let newPhotoFile = null;

// ── AUTH ──
auth.onAuthStateChanged(async user => {
  if(!user){ location.href="login.html"; return; }
  userId = user.uid;
  document.getElementById("email").value = user.email;
  document.getElementById("heroEmail").innerText = user.email;

  const doc = await db.collection("users").doc(userId).get();
  if(doc.exists){
    const d = doc.data();
    document.getElementById("fullName").value = d.fullName || "";
    document.getElementById("sex").value = d.sex || "";
    document.getElementById("dob").value = d.dob || "";
    document.getElementById("age").value = d.age || "";
    document.getElementById("phone").value = d.phone || "";
    document.getElementById("address").value = d.address || d.location || "";
    document.getElementById("nationality").value = d.nationality || "";
    document.getElementById("heroName").innerText = d.fullName || user.email;

    // Patient ID
    if(d.patientID){
      document.getElementById("patientIdText").innerText = d.patientID;
      document.getElementById("heroPatientId").style.display = "inline-flex";
    }

    // Avatar
    const avatarEl = document.getElementById("avatarEl");
    if(d.photoURL){
      avatarEl.innerHTML = `<img src="${d.photoURL}" onerror="this.parentElement.innerText='👤'">`;
    } else {
      const initials = (d.fullName||"").split(" ").map(n=>n[0]).slice(0,2).join("").toUpperCase();
      avatarEl.innerText = initials || "👤";
    }
  }

  // Wallet balance
  db.collection("wallets").doc(userId).onSnapshot(snap => {
    const bal = snap.exists ? (snap.data().balance || 0) : 0;
    document.getElementById("walletBal").innerText = "UGX " + bal.toLocaleString();
  });
});

// ── AGE ──
function calcAge(){
  const dob = new Date(document.getElementById("dob").value);
  if(isNaN(dob)) return;
  document.getElementById("age").value = Math.floor((Date.now()-dob.getTime())/(365.25*24*60*60*1000));
}

// ── PHOTO PREVIEW ──
function previewPhoto(input){
  const file = input.files[0];
  if(!file) return;
  newPhotoFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const avatarEl = document.getElementById("avatarEl");
    const img = document.createElement("img");
    img.src = e.target.result;
    avatarEl.innerHTML = "";
    avatarEl.appendChild(img);
  };
  reader.readAsDataURL(file);
}

// ── SAVE PROFILE ──
async function saveProfile(){
  const btn = document.getElementById("saveBtn");
  btn.classList.add("loading"); btn.disabled = true;

  try{
    let photoURL = null;

    // Upload new photo if selected
    if(newPhotoFile){
      const ref = storage.ref("profiles/" + userId);
      await ref.put(newPhotoFile);
      photoURL = await ref.getDownloadURL();
      // Update Firebase Auth profile
      await auth.currentUser.updateProfile({ photoURL });
    }

    const updateData = {
      fullName: document.getElementById("fullName").value.trim(),
      sex: document.getElementById("sex").value,
      dob: document.getElementById("dob").value,
      age: document.getElementById("age").value || null,
      phone: document.getElementById("phone").value.trim(),
      address: document.getElementById("address").value.trim(),
      location: document.getElementById("address").value.trim(),
      nationality: document.getElementById("nationality").value,
    };
    if(photoURL) updateData.photoURL = photoURL;

    // Use merge to preserve patientID, role, etc.
    await db.collection("users").doc(userId).set(updateData, { merge: true });

    document.getElementById("heroName").innerText = updateData.fullName || auth.currentUser.email;
    newPhotoFile = null;
    showToast("✅ Profile updated successfully!");
  } catch(err){
    showToast("❌ Failed: " + err.message);
  } finally {
    btn.classList.remove("loading"); btn.disabled = false;
  }
}

// ── CHANGE PASSWORD ──
async function changePassword(){
  const current = document.getElementById("currentPwd").value;
  const newPwd = document.getElementById("newPwd").value;
  const confirm = document.getElementById("confirmPwd").value;
  if(!current || !newPwd || !confirm){ showToast("Fill all password fields"); return; }
  if(newPwd.length < 6){ showToast("New password must be at least 6 characters"); return; }
  if(newPwd !== confirm){ showToast("Passwords do not match"); return; }

  try{
    // Re-authenticate first
    const cred = firebase.auth.EmailAuthProvider.credential(auth.currentUser.email, current);
    await auth.currentUser.reauthenticateWithCredential(cred);
    await auth.currentUser.updatePassword(newPwd);
    document.getElementById("pwdModal").classList.remove("open");
    document.getElementById("currentPwd").value = "";
    document.getElementById("newPwd").value = "";
    document.getElementById("confirmPwd").value = "";
    showToast("✅ Password changed successfully!");
  } catch(err){
    const msgs = {
      "auth/wrong-password":"Current password is incorrect.",
      "auth/weak-password":"New password is too weak."
    };
    showToast("❌ " + (msgs[err.code] || err.message));
  }
}

// ── SIGN OUT ──
async function signOut(){
  await auth.signOut();
  window.location.href = "login.html";
}

// ── DELETE ACCOUNT ──
async function deleteAccount(){
  if(!confirm("⚠️ Are you sure you want to permanently delete your account? This cannot be undone.")) return;
  const pwd = prompt("Enter your password to confirm deletion:");
  if(!pwd) return;
  try{
    const cred = firebase.auth.EmailAuthProvider.credential(auth.currentUser.email, pwd);
    await auth.currentUser.reauthenticateWithCredential(cred);
    await db.collection("users").doc(userId).delete();
    await auth.currentUser.delete();
    window.location.href = "register.html";
  } catch(err){
    showToast("❌ " + (err.code === "auth/wrong-password" ? "Wrong password" : err.message));
  }
}

// ── MODAL CLOSE ──
document.getElementById("pwdModal").addEventListener("click", e => {
  if(e.target === e.currentTarget) e.currentTarget.classList.remove("open");
});

// ── TOAST ──
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2800);
}
</script>
</body>
</html>
