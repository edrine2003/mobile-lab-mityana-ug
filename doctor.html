<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Chat Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',Arial,sans-serif;background:#f0f4f8;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* TOP BAR */
.topbar{
  background:linear-gradient(135deg,#0ea5e9,#14b8a6);
  padding:14px 20px;display:flex;align-items:center;gap:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);flex-shrink:0;
}
.topbar h2{color:#fff;font-size:18px;font-weight:900;margin:0;}
.topbar p{color:rgba(255,255,255,0.85);font-size:12px;font-weight:600;margin:2px 0 0;}
.topbar-icon{font-size:28px;}
.logout-btn{
  margin-left:auto;background:rgba(255,255,255,0.2);color:#fff;
  border:1px solid rgba(255,255,255,0.3);border-radius:999px;
  padding:8px 16px;font-size:13px;font-weight:800;cursor:pointer;
  font-family:'Nunito',Arial,sans-serif;transition:all 0.2s;
}
.logout-btn:hover{background:rgba(255,255,255,0.3);}

/* MAIN LAYOUT */
.main{display:flex;flex:1;overflow:hidden;}

/* PATIENT LIST */
.patient-list{
  width:300px;min-width:260px;background:#fff;
  border-right:1px solid #e2e8f0;
  display:flex;flex-direction:column;overflow:hidden;
}
.list-header{
  padding:14px 16px;border-bottom:1px solid #e2e8f0;
  font-size:14px;font-weight:800;color:#0f172a;
  display:flex;align-items:center;justify-content:space-between;
}
.list-search{
  padding:10px 14px;border-bottom:1px solid #e2e8f0;
}
.list-search input{
  width:100%;padding:9px 14px;border-radius:999px;
  border:1.5px solid #e2e8f0;background:#f8fafc;
  font-family:'Nunito',Arial,sans-serif;font-size:13px;font-weight:600;
  outline:none;color:#0f172a;
}
.list-search input:focus{border-color:#0ea5e9;}
.patients-scroll{flex:1;overflow-y:auto;}
.patients-scroll::-webkit-scrollbar{width:4px;}
.patients-scroll::-webkit-scrollbar-thumb{background:rgba(14,165,233,0.2);border-radius:999px;}

/* PATIENT ITEM */
.patient-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;cursor:pointer;transition:all 0.15s;
  border-bottom:1px solid #f1f5f9;position:relative;
}
.patient-item:hover{background:#f8fafc;}
.patient-item.active{background:linear-gradient(135deg,rgba(14,165,233,0.08),rgba(20,184,166,0.08));border-left:3px solid #0ea5e9;}
.patient-avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#0ea5e9,#14b8a6);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#fff;font-weight:900;flex-shrink:0;
}
.patient-meta{flex:1;min-width:0;}
.patient-meta h4{font-size:14px;font-weight:800;color:#0f172a;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.patient-meta p{font-size:12px;color:#64748b;font-weight:600;margin:2px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.unread-badge{
  background:linear-gradient(135deg,#0ea5e9,#14b8a6);
  color:#fff;border-radius:999px;font-size:11px;font-weight:900;
  padding:3px 8px;min-width:22px;text-align:center;
}
.patient-time{font-size:11px;color:#94a3b8;font-weight:700;position:absolute;top:14px;right:14px;}
.empty-list{padding:30px 16px;text-align:center;color:#94a3b8;font-size:13px;font-weight:700;}

/* CHAT PANEL */
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* No chat selected */
.no-chat{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  color:#94a3b8;
}
.no-chat .icon{font-size:64px;opacity:0.3;}
.no-chat p{font-size:15px;font-weight:700;}

/* Chat header */
.chat-top{
  background:#fff;padding:14px 18px;
  border-bottom:1px solid #e2e8f0;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);flex-shrink:0;
}
.chat-top h3{font-size:16px;font-weight:800;color:#0f172a;margin:0;}
.chat-top p{font-size:12px;color:#64748b;font-weight:600;margin:2px 0 0;}
.online-dot{width:9px;height:9px;border-radius:50%;background:#4ade80;display:inline-block;margin-right:4px;}

/* Messages */
.chat-messages{
  flex:1;overflow-y:auto;padding:16px 18px;
  display:flex;flex-direction:column;gap:10px;
  background:#f0f4f8;scroll-behavior:smooth;
}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(14,165,233,0.2);border-radius:999px;}

.date-divider{
  text-align:center;font-size:11px;font-weight:700;color:#94a3b8;
  background:rgba(148,163,184,0.15);border-radius:999px;
  padding:4px 14px;align-self:center;margin:4px 0;
}
.msg-row{display:flex;flex-direction:column;max-width:72%;}
.msg-row.patient{align-self:flex-start;align-items:flex-start;}
.msg-row.doctor{align-self:flex-end;align-items:flex-end;}
.sender-name{font-size:11px;font-weight:800;color:#0ea5e9;margin-bottom:3px;padding:0 4px;}
.bubble{
  padding:10px 14px;border-radius:18px;
  font-size:14px;font-weight:600;line-height:1.5;
  word-break:break-word;box-shadow:0 2px 8px rgba(0,0,0,0.07);
}
.msg-row.patient .bubble{background:#fff;color:#0f172a;border-bottom-left-radius:4px;border:1px solid rgba(0,0,0,0.06);}
.msg-row.doctor .bubble{background:linear-gradient(135deg,#0ea5e9,#14b8a6);color:#fff;border-bottom-right-radius:4px;}
.bubble img{max-width:200px;border-radius:12px;display:block;margin-top:4px;}
.bubble audio{width:100%;margin-top:4px;}
.msg-time{font-size:11px;color:#94a3b8;font-weight:700;margin-top:3px;padding:0 4px;}
.read-tick{font-size:12px;color:rgba(255,255,255,0.7);margin-left:4px;}
.read-tick.seen{color:#4ade80;}

.typing-indicator{
  display:none;align-self:flex-start;
  background:#fff;border-radius:18px;border-bottom-left-radius:4px;
  padding:10px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.typing-indicator span{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  background:#94a3b8;margin:0 2px;animation:typingBounce 1.2s infinite;
}
.typing-indicator span:nth-child(2){animation-delay:0.2s;}
.typing-indicator span:nth-child(3){animation-delay:0.4s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

/* Input bar */
.input-bar{
  background:#fff;padding:12px 16px;
  border-top:1px solid #e2e8f0;flex-shrink:0;
}
.file-preview{
  display:none;align-items:center;gap:8px;
  padding:8px 12px;background:#f0f9ff;border-radius:12px;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#0369a1;
  border:1px solid rgba(14,165,233,0.2);
}
.file-preview.show{display:flex;}
.file-preview-remove{cursor:pointer;color:#ef4444;font-size:16px;margin-left:auto;}
.input-row{display:flex;gap:8px;align-items:center;}
.msg-input{
  flex:1;padding:12px 16px;border-radius:999px;
  border:1.5px solid #e2e8f0;background:#f8fafc;
  font-family:'Nunito',Arial,sans-serif;font-size:14px;font-weight:600;
  outline:none;transition:all 0.2s;color:#0f172a;
}
.msg-input:focus{border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,0.12);}
.icon-btn{
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  transition:all 0.2s;flex-shrink:0;
}
.send-btn{background:linear-gradient(135deg,#0ea5e9,#14b8a6);color:#fff;box-shadow:0 4px 12px rgba(14,165,233,0.35);}
.send-btn:hover{transform:scale(1.08);}
.attach-btn{background:#f1f5f9;color:#64748b;}
.attach-btn:hover{background:#e2e8f0;}
.mic-btn{background:#f1f5f9;color:#64748b;}
.mic-btn.recording{background:#ef4444;color:#fff;animation:micPulse 1s infinite;}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4);}50%{box-shadow:0 0 0 8px rgba(239,68,68,0);}}
#docFileInput{display:none;}

/* Mobile responsive */
@media(max-width:700px){
  .patient-list{width:100%;min-width:unset;display:none;}
  .patient-list.mobile-show{display:flex;position:fixed;inset:0;z-index:50;top:60px;}
  .chat-panel{width:100%;}
  .back-to-list{display:flex !important;}
}
.back-to-list{
  display:none;background:#f1f5f9;border:none;border-radius:999px;
  padding:7px 14px;font-size:13px;font-weight:800;cursor:pointer;
  font-family:'Nunito',Arial,sans-serif;color:#0f172a;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="topbar-icon">👨‍⚕️</span>
  <div>
    <h2>Doctor Chat Dashboard</h2>
    <p>Mobile Lab – Mityana</p>
  </div>
  <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
</div>

<div class="main">
  <!-- PATIENT LIST -->
  <div class="patient-list" id="patientList">
    <div class="list-header">
      <span>💬 Patients</span>
      <span id="chatCount" style="font-size:12px;color:#64748b;font-weight:700;">0 chats</span>
    </div>
    <div class="list-search">
      <input type="text" id="searchPatients" placeholder="🔍 Search patient...">
    </div>
    <div class="patients-scroll" id="patientsScroll">
      <div class="empty-list">Loading chats...</div>
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel" id="chatPanel">
    <div class="no-chat" id="noChat">
      <div class="icon">💬</div>
      <p>Select a patient to start chatting</p>
    </div>

    <!-- Active chat (hidden until patient selected) -->
    <div id="activeChatArea" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden;">
      <div class="chat-top" id="chatTop">
        <button class="back-to-list" id="backToList">← Back</button>
        <div class="patient-avatar" id="activePtAvatar" style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#0ea5e9,#14b8a6);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:900;flex-shrink:0;">P</div>
        <div>
          <h3 id="activePtName">Patient</h3>
          <p id="activePtStatus"><span class="online-dot"></span>Mobile Lab Patient</p>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="typing-indicator" id="docTypingIndicator">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="input-bar">
        <div class="file-preview" id="docFilePreview">
          <span id="docFilePreviewName">📎 file</span>
          <span class="file-preview-remove" id="docRemoveFile">✕</span>
        </div>
        <div class="input-row">
          <button class="icon-btn attach-btn" onclick="document.getElementById('docFileInput').click()">📎</button>
          <input type="file" id="docFileInput" accept="image/*,audio/*">
          <input class="msg-input" type="text" id="docMessageInput" placeholder="Reply to patient...">
          <button class="icon-btn mic-btn" id="docMicBtn">🎤</button>
          <button class="icon-btn send-btn" onclick="sendDoctorMessage()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA4II_I1weZZGzP990t9UWJCXjuK932pdY",
  authDomain: "mobile-lab-mityana-aeae2.firebaseapp.com",
  projectId: "mobile-lab-mityana-aeae2",
  storageBucket: "mobile-lab-mityana-aeae2.firebasestorage.app"
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();
const auth = firebase.auth();

const ADMIN_EMAIL = "edrinehero@gmail.com";
let activeChatId = null;
let activePtName = "";
let allChats = [];
let msgUnsubscribe = null;
let typingTimeout;

// ── AUTH GUARD ──
auth.onAuthStateChanged(user => {
  if(!user || user.email !== ADMIN_EMAIL){
    alert("Access denied. Doctor only.");
    window.location.href = "login.html";
    return;
  }
  loadPatientList();
});

document.getElementById("logoutBtn").onclick = async () => {
  await auth.signOut();
  window.location.href = "login.html";
};

// ── LOAD PATIENT LIST ──
function loadPatientList(){
  db.collection("chats").orderBy("lastTime","desc").onSnapshot(snapshot => {
    allChats = [];
    snapshot.forEach(doc => { allChats.push({ id: doc.id, ...doc.data() }); });
    document.getElementById("chatCount").innerText = allChats.length + " chats";
    renderPatientList(allChats);
  });
}

function renderPatientList(chats){
  const scroll = document.getElementById("patientsScroll");
  const filter = document.getElementById("searchPatients").value.toLowerCase();
  const filtered = chats.filter(c => (c.patientName||"").toLowerCase().includes(filter) || (c.patientEmail||"").toLowerCase().includes(filter));

  if(filtered.length === 0){
    scroll.innerHTML = `<div class="empty-list">No patients yet</div>`;
    return;
  }
  scroll.innerHTML = "";
  filtered.forEach(chat => {
    const item = document.createElement("div");
    item.className = "patient-item" + (chat.id === activeChatId ? " active" : "");
    const initials = (chat.patientName||"P").charAt(0).toUpperCase();
    const unread = chat.unreadDoctor || 0;
    const lastMsg = chat.lastMessage || "No messages yet";
    const lastTime = chat.lastTime ? chat.lastTime.toDate().toLocaleTimeString("en-UG",{hour:"2-digit",minute:"2-digit"}) : "";
    item.innerHTML = `
      <div class="patient-avatar">${initials}</div>
      <div class="patient-meta">
        <h4>${chat.patientName || chat.patientEmail || "Unknown"}</h4>
        <p>${lastMsg}</p>
      </div>
      ${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ""}
      <div class="patient-time">${lastTime}</div>
    `;
    item.onclick = () => openChat(chat.id, chat.patientName || chat.patientEmail || "Patient");
    scroll.appendChild(item);
  });
}

document.getElementById("searchPatients").addEventListener("input", () => renderPatientList(allChats));

// ── OPEN CHAT ──
function openChat(chatId, ptName){
  activeChatId = chatId;
  activePtName = ptName;

  // Update UI
  document.getElementById("noChat").style.display = "none";
  const area = document.getElementById("activeChatArea");
  area.style.display = "flex";
  area.style.flexDirection = "column";
  area.style.overflow = "hidden";
  area.style.flex = "1";

  document.getElementById("activePtName").innerText = ptName;
  document.getElementById("activePtAvatar").innerText = ptName.charAt(0).toUpperCase();

  // Reset unread
  db.collection("chats").doc(chatId).update({ unreadDoctor: 0 });

  // Re-render list to show active
  renderPatientList(allChats);

  // Unsubscribe previous listener
  if(msgUnsubscribe) msgUnsubscribe();
  listenChatMessages(chatId);
  listenPatientTyping(chatId);

  // Mobile: hide list
  document.getElementById("patientList").classList.remove("mobile-show");
}

// ── LISTEN MESSAGES ──
function listenChatMessages(chatId){
  const messagesDiv = document.getElementById("chatMessages");
  const typingEl = document.getElementById("docTypingIndicator");

  msgUnsubscribe = db.collection("chats").doc(chatId).collection("messages")
    .orderBy("timestamp")
    .onSnapshot(snapshot => {
      messagesDiv.querySelectorAll(".msg-row, .date-divider").forEach(el => el.remove());

      let lastDate = "";
      snapshot.forEach(docSnap => {
        const msg = docSnap.data();
        const ts = msg.timestamp ? msg.timestamp.toDate() : new Date();
        const dateStr = ts.toLocaleDateString("en-UG",{weekday:"short",month:"short",day:"numeric"});

        if(dateStr !== lastDate){
          const div = document.createElement("div");
          div.className = "date-divider";
          div.innerText = dateStr;
          messagesDiv.insertBefore(div, typingEl);
          lastDate = dateStr;
        }

        const row = document.createElement("div");
        row.className = "msg-row " + msg.sender;

        if(msg.sender === "patient"){
          const name = document.createElement("div");
          name.className = "sender-name";
          name.innerText = "👤 " + (msg.senderName || activePtName);
          row.appendChild(name);
        }

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        if(msg.type === "text"){
          bubble.innerText = msg.text;
          if(msg.sender === "doctor"){
            const tick = document.createElement("span");
            tick.className = "read-tick" + (msg.seenByPatient ? " seen" : "");
            tick.innerText = msg.seenByPatient ? " ✓✓" : " ✓";
            bubble.appendChild(tick);
          }
        } else if(msg.type === "image"){
          bubble.innerHTML = `<img src="${msg.fileUrl}" alt="image">`;
        } else if(msg.type === "audio"){
          bubble.innerHTML = `<audio controls src="${msg.fileUrl}"></audio>`;
        }

        const timeEl = document.createElement("div");
        timeEl.className = "msg-time";
        timeEl.innerText = ts.toLocaleTimeString("en-UG",{hour:"2-digit",minute:"2-digit"});

        row.appendChild(bubble);
        row.appendChild(timeEl);
        messagesDiv.insertBefore(row, typingEl);

        // Mark patient messages as seen by doctor
        if(msg.sender === "patient" && !msg.seenByDoctor){
          docSnap.ref.update({ seenByDoctor: true });
        }
      });

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
}

// ── PATIENT TYPING ──
function listenPatientTyping(chatId){
  db.collection("chats").doc(chatId).onSnapshot(snap => {
    const data = snap.data();
    const el = document.getElementById("docTypingIndicator");
    if(data && data.patientTyping){
      el.style.display = "flex";
      document.getElementById("chatMessages").scrollTop = 99999;
    } else {
      el.style.display = "none";
    }
  });
}

// Doctor typing indicator to patient
document.getElementById("docMessageInput").addEventListener("input", () => {
  if(!activeChatId) return;
  db.collection("chats").doc(activeChatId).update({ doctorTyping: true });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    db.collection("chats").doc(activeChatId).update({ doctorTyping: false });
  }, 2000);
});

// ── SEND DOCTOR MESSAGE ──
async function sendDoctorMessage(){
  if(!activeChatId) return;
  const input = document.getElementById("docMessageInput");
  const fileInput = document.getElementById("docFileInput");
  const text = input.value.trim();
  if(!text && fileInput.files.length === 0) return;

  let data = {
    sender: "doctor",
    senderName: "Dr. Edrine",
    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
    seenByPatient: false
  };

  if(fileInput.files.length > 0){
    const file = fileInput.files[0];
    const ref = storage.ref("chatFiles/" + activeChatId + "/" + Date.now() + "_" + file.name);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    data.type = file.type.startsWith("audio") ? "audio" : "image";
    data.fileUrl = url;
  } else {
    data.type = "text";
    data.text = text;
  }

  await db.collection("chats").doc(activeChatId).collection("messages").add(data);
  await db.collection("chats").doc(activeChatId).update({
    lastMessage: data.type === "text" ? "Dr: " + text : "Dr: [" + data.type + "]",
    lastTime: firebase.firestore.FieldValue.serverTimestamp(),
    doctorTyping: false
  });

  input.value = "";
  fileInput.value = "";
  docHideFilePreview();
  clearTimeout(typingTimeout);
}

document.getElementById("docMessageInput").addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendDoctorMessage(); }
});

// ── FILE PREVIEW ──
document.getElementById("docFileInput").addEventListener("change", () => {
  const f = document.getElementById("docFileInput").files[0];
  if(f){
    document.getElementById("docFilePreviewName").innerText = "📎 " + f.name;
    document.getElementById("docFilePreview").classList.add("show");
  }
});
document.getElementById("docRemoveFile").onclick = () => {
  document.getElementById("docFileInput").value = "";
  docHideFilePreview();
};
function docHideFilePreview(){
  document.getElementById("docFilePreview").classList.remove("show");
  document.getElementById("docFilePreviewName").innerText = "📎 file";
}

// ── VOICE RECORDING ──
let recorder, chunks = [], isRecording = false;
const micBtn = document.getElementById("docMicBtn");
micBtn.addEventListener("click", async () => {
  if(!activeChatId) return;
  if(!isRecording){
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recorder = new MediaRecorder(stream);
    chunks = [];
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = async () => {
      const blob = new Blob(chunks, { type: "audio/webm" });
      const ref = storage.ref("chatAudio/" + activeChatId + "/doc_" + Date.now() + ".webm");
      await ref.put(blob);
      const url = await ref.getDownloadURL();
      await db.collection("chats").doc(activeChatId).collection("messages").add({
        sender: "doctor", senderName: "Dr. Edrine",
        type: "audio", fileUrl: url,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        seenByPatient: false
      });
      await db.collection("chats").doc(activeChatId).update({
        lastMessage: "Dr: [voice message]",
        lastTime: firebase.firestore.FieldValue.serverTimestamp()
      });
    };
    recorder.start();
    isRecording = true;
    micBtn.classList.add("recording");
    micBtn.innerText = "⏹";
  } else {
    recorder.stop();
    isRecording = false;
    micBtn.classList.remove("recording");
    micBtn.innerText = "🎤";
  }
});
