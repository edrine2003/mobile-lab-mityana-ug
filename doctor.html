<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Dashboard</title>

<style>
body { font-family: Arial; }
.container { display: flex; }
.sidebar {
    width: 30%;
    border-right: 1px solid #ccc;
}
.patient {
    padding: 10px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}
.chat-area {
    width: 70%;
    padding: 10px;
}
.chat-box {
    height: 350px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 10px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</head>

<body>

<h2>Doctor Inbox</h2>

<div class="container">

<div class="sidebar" id="patientsList"></div>

<div class="chat-area">
    <div class="chat-box" id="chatBox"></div>
    <input type="text" id="replyInput">
    <button onclick="sendReply()">Send</button>
</div>

</div>

<script>
// SAME CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyA4II_I1weZZGzP990t9UWJCXjuK932pdY",
  authDomain: "mobile-lab-mityana-aeae2.firebaseapp.com",
  projectId: "mobile-lab-mityana-aeae2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentChat = null;

// LOAD PATIENTS
db.collection("chats").onSnapshot(snapshot => {
    const list = document.getElementById("patientsList");
    list.innerHTML = "";

    snapshot.forEach(doc => {
        const div = document.createElement("div");
        div.className = "patient";
        div.innerText = doc.id;
        div.onclick = () => openChat(doc.id);
        list.appendChild(div);
    });
});

// OPEN CHAT
function openChat(chatId) {
    currentChat = chatId;

    db.collection("chats").doc(chatId)
    .collection("messages")
    .orderBy("timestamp")
    .onSnapshot(snapshot => {
        const box = document.getElementById("chatBox");
        box.innerHTML = "";

        snapshot.forEach(doc => {
            const msg = doc.data();
            const div = document.createElement("div");

            if (msg.type === "text") {
                div.innerText = msg.sender + ": " + msg.text;
            }
            else if (msg.type === "image") {
                div.innerHTML = `<img src="${msg.fileUrl}" width="100">`;
            }
            else if (msg.type === "audio") {
                div.innerHTML = `<audio controls src="${msg.fileUrl}"></audio>`;
            }

            box.appendChild(div);
        });
    });
}

// SEND REPLY
async function sendReply() {
    const input = document.getElementById("replyInput");

    await db.collection("chats").doc(currentChat)
    .collection("messages").add({
        sender: "doctor",
        type: "text",
        text: input.value,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    input.value = "";
}
</script>

</body>
</html>
