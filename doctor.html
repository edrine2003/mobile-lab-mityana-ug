<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Chat</title>

<style>
.container { display: flex; }
.sidebar {
    width: 30%;
    border-right: 1px solid #ccc;
}
.chat-area {
    width: 70%;
    padding: 10px;
}
.patient-item {
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
}
.chat-box {
    height: 300px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 10px;
}
</style>
</head>

<body>

<h2>Doctor Inbox</h2>

<div class="container">
    
    <div class="sidebar" id="patientsList"></div>

    <div class="chat-area">
        <div class="chat-box" id="chatBox"></div>

        <input type="text" id="replyInput" placeholder="Reply...">
        <button onclick="sendReply()">Send</button>
    </div>

</div>

<script>
let chats = {
    "patient1": [
        { sender: "patient", message: "Hello doctor" }
    ],
    "patient2": [
        { sender: "patient", message: "I have headache" }
    ]
};

let currentPatient = null;

// Load patients
function loadPatients(){
    const list = document.getElementById("patientsList");

    Object.keys(chats).forEach(id => {
        const div = document.createElement("div");
        div.className = "patient-item";
        div.innerText = id;
        div.onclick = () => openChat(id);
        list.appendChild(div);
    });
}

function openChat(id){
    currentPatient = id;
    renderChat();
}

function renderChat(){
    const box = document.getElementById("chatBox");
    box.innerHTML = "";

    chats[currentPatient].forEach(msg => {
        const div = document.createElement("div");
        div.innerText = msg.sender + ": " + msg.message;
        box.appendChild(div);
    });
}

function sendReply(){
    const input = document.getElementById("replyInput");

    chats[currentPatient].push({
        sender: "doctor",
        message: input.value
    });

    input.value = "";
    renderChat();
}

loadPatients();
</script>

</body>
</html>
