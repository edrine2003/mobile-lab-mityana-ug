<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧪 Ongoing Tests – Mobile Lab</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Arial;
margin:0;
background:#f1f5f9;
padding:16px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

button{
cursor:pointer;
border:none;
border-radius:8px;
padding:10px 14px;
font-weight:bold;
}

#logoutBtn{background:#ef4444;color:white;}
#chatBtn{background:#0ea5e9;color:white;}

#search{
padding:10px;
width:100%;
max-width:400px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:20px;
}

.order-card{
background:white;
border-radius:12px;
padding:16px;
margin-bottom:16px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.order-card h3{
margin-top:0;
color:#0284c7;
}

.result-input{
width:100%;
padding:6px;
border-radius:6px;
border:1px solid #cbd5e1;
margin-top:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:8px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

th{background:#e2e8f0;}

.complete{background:#22c55e;color:white;margin-top:12px;}
.delete{background:#ef4444;color:white;margin-left:10px;}
.whatsapp{background:#25D366;color:white;margin-left:10px;}
</style>
</head>

<body>

<header>
<h2>🧪 Ongoing Tests</h2>

<div>
<button id="chatBtn">💬 Chat</button>
<button id="logoutBtn">Logout</button>
</div>
</header>

<input id="search" placeholder="Search patient name or phone">

<div id="ordersCounter"></div>
<div id="ordersContainer"></div>

<script>

const firebaseConfig={
apiKey:"AIzaSyA4II_I1weZZGzP990t9UWJCXjuK932pdY",
authDomain:"mobile-lab-mityana-aeae2.firebaseapp.com",
projectId:"mobile-lab-mityana-aeae2"
};

if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

const container=document.getElementById("ordersContainer");
const counter=document.getElementById("ordersCounter");
const search=document.getElementById("search");

let allOrders=[];


/* AUTH */

auth.onAuthStateChanged(async user=>{

if(!user){location.href="login.html";return;}

const u=await db.collection("users").doc(user.uid).get();

if(!u.exists || u.data().role!=="admin"){
alert("Access denied");
auth.signOut();
location.href="login.html";
return;
}

loadOrders();

});


/* LOGOUT */

logoutBtn.onclick=async()=>{
await auth.signOut();
location.href="login.html";
};


/* CHAT */

chatBtn.onclick=()=>{
location.href="patient_chat.html";
};


/* LOAD ORDERS (REAL-TIME) */

function loadOrders(){

db.collection("orders")
.where("status","==","ongoing")
.orderBy("createdAt","asc")
.onSnapshot(snap=>{

allOrders=[];

snap.forEach(d=>{
allOrders.push({id:d.id,...d.data()});
});

counter.innerText=`Ongoing Tests: ${allOrders.length}`;

renderOrders(allOrders);

},err=>{
console.error(err);
container.innerHTML="Error loading orders";
});

}


/* SEARCH */

search.oninput=()=>{

const q=search.value.toLowerCase();

const filtered=allOrders.filter(o=>

(o.name||"").toLowerCase().includes(q) ||
(o.phone||"").includes(q)

);

renderOrders(filtered);

};


/* RENDER */

function renderOrders(list){

container.innerHTML="";

list.forEach(o=>{

const card=document.createElement("div");
card.className="order-card";

let html=`
<h3>${o.name || ""}</h3>

<p><b>Age:</b> ${o.age || ""}</p>
<p><b>Phone:</b> ${o.phone || ""}</p>
<p><b>Email:</b> ${o.email || ""}</p>

<p><b>Tests:</b> ${o.tests}</p>

<label>Result</label>
<input class="result-input" placeholder="Enter result">
`;

html+=`
<br>
<button class="complete">Complete</button>
<button class="delete">Delete</button>
<button class="whatsapp">WhatsApp</button>
`;

card.innerHTML=html;
container.appendChild(card);

const completeBtn=card.querySelector(".complete");
const deleteBtn=card.querySelector(".delete");

/* DELETE */

deleteBtn.onclick=async()=>{

if(!confirm("Delete this test?")) return;

deleteBtn.disabled=true;
deleteBtn.innerText="Deleting...";

try{
await db.collection("orders").doc(o.id).delete();
alert("Deleted");
}catch(err){
alert("❌ Failed: "+err.message);
deleteBtn.disabled=false;
deleteBtn.innerText="Delete";
}

};


/* COMPLETE */

completeBtn.onclick=async()=>{

const result=card.querySelector(".result-input").value;

if(!result){
alert("Enter result");
return;
}

completeBtn.disabled=true;
completeBtn.innerText="Saving...";

try{

await db.collection("results").doc(o.id).set({

order_id:o.id,
userId:o.userId,
patient_name:o.name,
patient_age:o.age,
patient_email:o.email,
result:result,
uploaded_at:firebase.firestore.FieldValue.serverTimestamp()

});

await db.collection("orders").doc(o.id).update({
status:"completed",
updatedAt: firebase.firestore.FieldValue.serverTimestamp()
});

generatePDF(o,result);

}catch(err){
alert("❌ Failed: "+err.message);
completeBtn.disabled=false;
completeBtn.innerText="Complete";
}

};


/* WHATSAPP */

card.querySelector(".whatsapp").onclick=()=>{

let phone=(o.phone||"").replace(/\D/g,"");

if(phone.startsWith("0")){
phone="256"+phone.substring(1);
}

const msg=`Hello ${o.name}, your lab result from Mobile Lab is ready.`;

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);

};

});

}


/* PDF */

function generatePDF(o,result){

const {jsPDF}=window.jspdf;

const pdf=new jsPDF();

let y=20;

pdf.setFontSize(18);
pdf.text("Mobile Lab Services",105,y,{align:"center"});

y+=15;

pdf.setFontSize(12);

pdf.text(`Patient: ${o.name}`,20,y); y+=8;
pdf.text(`Age: ${o.age}`,20,y); y+=8;
pdf.text(`Phone: ${o.phone}`,20,y); y+=12;

pdf.text(`Result: ${result}`,20,y);

pdf.save(`Lab_Result_${o.name}.pdf`);

}

</script>

</body>
</html>
