<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧪 Ongoing Tests – Mobile Lab</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f1f5f9;padding:16px;}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
button{cursor:pointer;border:none;border-radius:8px;padding:10px 14px;font-weight:bold;}
#logoutBtn{background:#ef4444;color:white;}
#chatBtn{background:#0ea5e9;color:white;}
#search{padding:10px;width:100%;max-width:400px;border-radius:8px;border:1px solid #ccc;margin-bottom:20px;}

.order-card{
background:white;
border-radius:12px;
padding:16px;
margin-bottom:16px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.order-card h3{margin-top:0;color:#0284c7;}

.result-input{
width:100%;
padding:6px;
border-radius:6px;
border:1px solid #cbd5e1;
margin-top:5px;
margin-bottom:8px;
}

.complete{background:#22c55e;color:white;margin-top:10px;}
.delete{background:#ef4444;color:white;margin-left:10px;}
.whatsapp{background:#25D366;color:white;margin-left:10px;}
</style>
</head>

<body>

<header>
<h2>🧪 Ongoing Tests</h2>
<div>
<button id="chatBtn">💬 Chat</button>
<button id="logoutBtn">Logout</button>
</div>
</header>

<input id="search" placeholder="Search patient name or phone">

<div id="ordersCounter"></div>
<div id="ordersContainer"></div>

<script>

const firebaseConfig={
apiKey:"AIzaSyA4II_I1weZZGzP990t9UWJCXjuK932pdY",
authDomain:"mobile-lab-mityana-aeae2.firebaseapp.com",
projectId:"mobile-lab-mityana-aeae2"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

const container=document.getElementById("ordersContainer");
const counter=document.getElementById("ordersCounter");
const search=document.getElementById("search");

let allOrders=[];

/* AUTH */
auth.onAuthStateChanged(async user=>{
if(!user){location.href="login.html";return;}

const u=await db.collection("users").doc(user.uid).get();

if(!u.exists || u.data().role!=="admin"){
alert("Access denied");
auth.signOut();
location.href="login.html";
return;
}

loadOrders();
});

/* LOGOUT */
logoutBtn.onclick=async()=>{
await auth.signOut();
location.href="login.html";
};

/* CHAT */
chatBtn.onclick=()=>{
location.href="patient_chat.html";
};

/* LOAD ORDERS */
async function loadOrders(){

const snap=await db.collection("orders")
.where("status","==","ongoing")
.orderBy("createdAt","asc")
.get();

allOrders=[];

snap.forEach(d=>{
allOrders.push({id:d.id,...d.data()});
});

counter.innerText=`Ongoing Tests: ${allOrders.length}`;

renderOrders(allOrders);
}

/* SEARCH */
search.oninput=()=>{
const q=search.value.toLowerCase();

const filtered=allOrders.filter(o=>
(o.name||"").toLowerCase().includes(q) ||
(o.phone||"").includes(q)
);

renderOrders(filtered);
};

/* RENDER */
function renderOrders(list){

container.innerHTML="";

list.forEach(o=>{

const card=document.createElement("div");
card.className="order-card";

/* 🔥 SPLIT TESTS CLEANLY */
const testsList = o.tests
? o.tests.split("\n").map(t=>t.trim()).filter(t=>t)
: [];

let inputsHTML="";

/* create input per test */
testsList.forEach(test=>{
inputsHTML += `
<label><b>${test}</b></label>
<input class="result-input" data-test="${test}" placeholder="Enter result">
`;
});

let html=`
<h3>${o.name || ""}</h3>

<p><b>Age:</b> ${o.age || ""}</p>
<p><b>Phone:</b> ${o.phone || ""}</p>
<p><b>Email:</b> ${o.email || ""}</p>

<p><b>Tests:</b><br>${o.tests || ""}</p>

${inputsHTML}
`;

html+=`
<button class="complete">Complete</button>
<button class="delete">Delete</button>
<button class="whatsapp">WhatsApp</button>
`;

card.innerHTML=html;
container.appendChild(card);

/* DELETE */
card.querySelector(".delete").onclick=async()=>{
if(!confirm("Delete this test?")) return;

await db.collection("orders").doc(o.id).delete();
alert("Deleted");
loadOrders();
};

/* ✅ COMPLETE (FIXED SYSTEM) */
card.querySelector(".complete").onclick=async()=>{

let resultsObj = {};

/* collect results */
card.querySelectorAll(".result-input").forEach(input=>{

const testName = input.dataset.test;
const value = input.value.trim();

if(!value) return;

resultsObj[testName] = {
  Result:{
    value:value,
    units:""
  }
};

});

if(Object.keys(resultsObj).length === 0){
alert("Enter at least one result");
return;
}

/* SAVE STRUCTURED RESULTS */
await db.collection("results").doc(o.id).set({

order_id:o.id,
userId:o.userId,
patientName:o.name,
patientEmail:o.email,

results: resultsObj,

uploaded_at:firebase.firestore.FieldValue.serverTimestamp()

});

/* UPDATE STATUS */
await db.collection("orders").doc(o.id).update({
status:"completed"
});

/* GENERATE PDF */
generatePDF(o,resultsObj);

};

/* WHATSAPP */
card.querySelector(".whatsapp").onclick=()=>{
const msg=`Hello ${o.name}, your lab result is ready.`;
const phone=o.phone.replace("+","");
window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
};

});

}

/* PDF */
function generatePDF(o,results){

const {jsPDF}=window.jspdf;
const pdf=new jsPDF();

let y=20;

pdf.setFontSize(18);
pdf.text("Mobile Lab Services",105,y,{align:"center"});

y+=15;

pdf.setFontSize(12);

pdf.text(`Patient: ${o.name}`,20,y); y+=8;
pdf.text(`Age: ${o.age}`,20,y); y+=8;
pdf.text(`Phone: ${o.phone}`,20,y); y+=12;

Object.keys(results).forEach(test=>{
pdf.text(`${test}: ${results[test].Result.value}`,20,y);
y+=8;
});

pdf.save(`Lab_Result_${o.name}.pdf`);

loadOrders();
}

</script>

</body>
</html>
