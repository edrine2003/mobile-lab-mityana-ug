<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🧪 Ongoing Tests – Mobile Lab</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f1f5f9;padding:16px;}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

button{
cursor:pointer;
border:none;
border-radius:8px;
padding:10px 14px;
font-weight:bold;
}

#logoutBtn{background:#ef4444;color:white;}
#chatBtn{background:#0ea5e9;color:white;}

#search{
padding:10px;
width:100%;
max-width:400px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:20px;
}

.order-card{
background:white;
border-radius:12px;
padding:16px;
margin-bottom:16px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.order-card h3{
margin-top:0;
color:#0284c7;
}

.result-input{
width:100%;
padding:6px;
border-radius:6px;
border:1px solid #cbd5e1;
margin-top:5px;
}

.complete{background:#22c55e;color:white;margin-top:12px;}
.delete{background:#ef4444;color:white;margin-left:10px;}
.whatsapp{background:#25D366;color:white;margin-left:10px;}
</style>
</head>

<body>

<header>
<h2>🧪 Ongoing Tests</h2>

<div>
<button id="chatBtn">💬 Chat</button>
<button id="logoutBtn">Logout</button>
</div>
</header>

<input id="search" placeholder="Search patient name or phone">

<div id="ordersCounter"></div>
<div id="ordersContainer"></div>

<script>

const firebaseConfig={
apiKey:"AIzaSyA4II_I1weZZGzP990t9UWJCXjuK932pdY",
authDomain:"mobile-lab-mityana-aeae2.firebaseapp.com",
projectId:"mobile-lab-mityana-aeae2"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

const container=document.getElementById("ordersContainer");
const counter=document.getElementById("ordersCounter");
const search=document.getElementById("search");

let allOrders=[];

/* AUTH */
auth.onAuthStateChanged(async user=>{
if(!user){location.href="login.html";return;}

const u=await db.collection("users").doc(user.uid).get();

if(!u.exists || u.data().role!=="admin"){
alert("Access denied");
auth.signOut();
location.href="login.html";
return;
}

loadOrders();
});

/* LOGOUT */
logoutBtn.onclick=async()=>{
await auth.signOut();
location.href="login.html";
};

/* CHAT */
chatBtn.onclick=()=>{
location.href="patient_chat.html";
};

/* LOAD ORDERS */
async function loadOrders(){

const snap=await db.collection("orders")
.where("status","==","ongoing")
.orderBy("createdAt","asc")
.get();

allOrders=[];

snap.forEach(d=>{
allOrders.push({id:d.id,...d.data()});
});

counter.innerText=`Ongoing Tests: ${allOrders.length}`;

renderOrders(allOrders);
}

/* SEARCH */
search.oninput=()=>{
const q=search.value.toLowerCase();

const filtered=allOrders.filter(o=>
(o.name||"").toLowerCase().includes(q) ||
(o.phone||"").includes(q)
);

renderOrders(filtered);
};

/* RENDER */
function renderOrders(list){

container.innerHTML="";

list.forEach(o=>{

const card=document.createElement("div");
card.className="order-card";

/* SPLIT TESTS CLEANLY */
let testsArray = [];

if(o.tests){
testsArray = o.tests.split("\n").map(t=>t.trim()).filter(t=>t);
}

/* BUILD INPUTS FOR EACH TEST */
let inputsHTML = "";

testsArray.forEach(test=>{
inputsHTML += `
<label>${test}</label>
<input class="result-input" data-test="${test}" placeholder="Enter result for ${test}">
`;
});

card.innerHTML=`
<h3>${o.name || ""}</h3>

<p><b>Age:</b> ${o.age || ""}</p>
<p><b>Phone:</b> ${o.phone || ""}</p>
<p><b>Email:</b> ${o.email || ""}</p>

<p><b>Tests:</b><br>${testsArray.join("<br>")}</p>

${inputsHTML}

<br>
<button class="complete">Complete</button>
<button class="delete">Delete</button>
<button class="whatsapp">WhatsApp</button>
`;

container.appendChild(card);

/* DELETE */
card.querySelector(".delete").onclick=async()=>{
if(!confirm("Delete this test?")) return;

await db.collection("orders").doc(o.id).delete();
alert("Deleted");
loadOrders();
};

/* COMPLETE */
card.querySelector(".complete").onclick=async()=>{

const inputs = card.querySelectorAll(".result-input");

let results = {};

inputs.forEach(input=>{
const test = input.dataset.test;
const value = input.value.trim();

if(value){
results[test] = {
value: value,
units: ""
};
}
});

if(Object.keys(results).length === 0){
alert("Enter at least one result");
return;
}

/* SAVE RESULTS CORRECTLY */
await db.collection("results").doc(o.id).set({

order_id:o.id,
userId:o.userId,

patientName:o.name || "",
patientEmail:o.email || "",

results:results,

uploaded_at:firebase.firestore.FieldValue.serverTimestamp()

});

/* UPDATE STATUS */
await db.collection("orders").doc(o.id).update({
status:"completed"
});

generatePDF(o, results);
};

/* WHATSAPP */
card.querySelector(".whatsapp").onclick=()=>{
const msg=`Hello ${o.name}, your lab results are ready. Please check your app.`;
const phone=o.phone.replace("+","");
window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
};

});
}

/* PDF */
function generatePDF(o,results){

const {jsPDF}=window.jspdf;
const pdf=new jsPDF();

let y=20;

pdf.setFontSize(18);
pdf.text("Mobile Lab Services",105,y,{align:"center"});

y+=15;

pdf.setFontSize(12);

pdf.text(`Patient: ${o.name}`,20,y); y+=8;
pdf.text(`Age: ${o.age}`,20,y); y+=8;
pdf.text(`Phone: ${o.phone}`,20,y); y+=12;

/* LOOP RESULTS CLEANLY */
Object.entries(results).forEach(([test,val])=>{
pdf.text(`${test}: ${val.value}`,20,y);
y+=8;
});

pdf.save(`Lab_Result_${o.name}.pdf`);

loadOrders();
}

</script>

</body>
</html>
