<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Completed Results | Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6f8;padding:20px;}

.result-card{
background:#fff;
padding:15px;
margin:15px 0;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.test-block{
margin-top:10px;
padding:10px;
background:#f1f5f9;
border-radius:8px;
}

input{
width:100%;
padding:6px;
margin-top:4px;
border:1px solid #ccc;
border-radius:6px;
}

button{
margin-top:10px;
margin-right:6px;
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.save{background:#0ea5e9;color:#fff;}
.pdf{background:#22c55e;color:#fff;}
.del{background:#ef4444;color:#fff;}
</style>
</head>

<body>

<h2>Completed Test Results (Admin)</h2>
<button id="logoutBtn">Logout</button>

<div id="resultsContainer">Loading…</div>

<script>

firebase.initializeApp({
  apiKey:"AIzaSyA4II_I1weZZGzP990t9UWJCXjuK932pdY",
  authDomain:"mobile-lab-mityana-aeae2.firebaseapp.com",
  projectId:"mobile-lab-mityana-aeae2"
});

const auth = firebase.auth();
const db = firebase.firestore();
const box = document.getElementById("resultsContainer");

/* AUTH */
auth.onAuthStateChanged(async user=>{
  if(!user) return location.href="login.html";

  const u = await db.collection("users").doc(user.uid).get();

  if(!u.exists || u.data().role !== "admin"){
    await auth.signOut();
    return location.href="login.html";
  }

  loadResults();
});

/* LOGOUT */
document.getElementById("logoutBtn").onclick = ()=>auth.signOut();

/* LOAD RESULTS */
async function loadResults(){

  box.innerHTML = "";

  const snap = await db.collection("orders")
    .where("status","==","completed")
    .get();

  if(snap.empty){
    box.innerHTML = "<p>No completed results</p>";
    return;
  }

  for(const o of snap.docs){

    const resDoc = await db.collection("results").doc(o.id).get();
    if(!resDoc.exists) continue;

    const data = resDoc.data();
    const results = data.results || {};

    const card = document.createElement("div");
    card.className = "result-card";

    let html = `
      <h3>${data.patientName || "Patient"}</h3>
      <p><b>Order ID:</b> ${o.id}</p>
    `;

    /* DISPLAY TESTS CLEANLY */
    Object.keys(results).forEach(test=>{

      const value = results[test]?.Result?.value || "";

      html += `
        <div class="test-block">
          <b>${test}</b>
          <input data-test="${test}" value="${value}">
        </div>
      `;

    });

    html += `
      <button class="save">Update</button>
      <button class="pdf">PDF</button>
      <button class="del">Delete</button>
    `;

    card.innerHTML = html;
    box.appendChild(card);

    /* UPDATE */
    card.querySelector(".save").onclick = async ()=>{

      let updated = {};

      card.querySelectorAll("input").forEach(i=>{
        updated[i.dataset.test] = {
          Result:{
            value:i.value,
            units:""
          }
        };
      });

      await db.collection("results").doc(o.id).update({
        results: updated
      });

      alert("Updated!");
    };

    /* PDF */
    card.querySelector(".pdf").onclick = ()=>{

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();

      let y = 20;

      pdf.text("Mobile Lab Results",105,y,{align:"center"});
      y+=10;

      pdf.text(`Patient: ${data.patientName}`,20,y); y+=8;

      Object.keys(results).forEach(test=>{
        pdf.text(`${test}: ${results[test].Result.value}`,20,y);
        y+=8;
      });

      pdf.save(`Result_${o.id}.pdf`);

    };

    /* DELETE */
    card.querySelector(".del").onclick = async ()=>{

      if(!confirm("Delete result?")) return;

      await db.collection("results").doc(o.id).delete();
      await db.collection("orders").doc(o.id).update({
        status:"ongoing"
      });

      card.remove();

    };

  }

}

</script>

</body>
</html>
