<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Tests Guide – Mobile Lab Mityana</title>
<meta name="theme-color" content="#0ea5e9">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#0ea5e9;--primary2:#14b8a6;--green:#22c55e;
  --red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;
  --dark:#0f172a;--muted:#64748b;--border:rgba(0,0,0,0.08);
  --bg:#f0f9ff;--card:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',Arial,sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;padding-bottom:60px;}

/* HERO */
.hero{background:linear-gradient(135deg,#0ea5e9,#14b8a6,#10b981);padding:32px 20px 28px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none;}
.hero h1{color:#fff;font-size:26px;font-weight:900;text-shadow:0 2px 10px rgba(0,0,0,0.15);}
.hero p{color:rgba(255,255,255,0.9);font-size:14px;font-weight:600;margin-top:8px;}
.hero-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px;}
.hero-btn{text-decoration:none;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:800;color:#fff;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.35);transition:all 0.2s;}
.hero-btn:hover{background:rgba(255,255,255,0.35);}

/* SEARCH BAR */
.search-wrap{max-width:700px;margin:20px auto 0;padding:0 16px;}
.search-box{width:100%;padding:14px 18px;border-radius:16px;border:2px solid var(--border);font-family:'Nunito',Arial,sans-serif;font-size:15px;font-weight:600;outline:none;box-shadow:0 4px 20px rgba(0,0,0,0.08);transition:all 0.2s;}
.search-box:focus{border-color:var(--primary);box-shadow:0 4px 20px rgba(14,165,233,0.2);}

/* CATEGORY TABS */
.tabs-wrap{max-width:900px;margin:20px auto 0;padding:0 16px;}
.tabs{display:flex;gap:8px;flex-wrap:wrap;}
.tab{padding:8px 16px;border-radius:999px;font-size:13px;font-weight:800;cursor:pointer;border:2px solid var(--border);background:#fff;color:var(--muted);transition:all 0.2s;font-family:'Nunito',Arial,sans-serif;}
.tab.active,.tab:hover{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(14,165,233,0.3);}

/* RESULTS COUNT */
.results-info{max-width:900px;margin:12px auto 0;padding:0 16px;font-size:13px;font-weight:700;color:var(--muted);}

/* GRID */
.grid{max-width:900px;margin:16px auto;padding:0 16px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:650px){.grid{grid-template-columns:1fr;}}

/* TEST CARD */
.test-card{background:var(--card);border-radius:22px;box-shadow:0 4px 20px rgba(0,0,0,0.07);border:1px solid var(--border);overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;animation:fadeUp 0.4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.test-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.12);}
.test-card.hidden{display:none;}

/* CARD HEADER */
.card-head{padding:16px 18px 12px;display:flex;align-items:flex-start;gap:12px;}
.card-icon{width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.card-title{font-size:16px;font-weight:900;color:var(--dark);margin-bottom:3px;}
.card-category{font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;display:inline-block;}
.card-price{margin-top:6px;font-size:13px;font-weight:800;color:var(--primary);}

/* SECTIONS INSIDE CARD */
.card-body{padding:0 18px 18px;}
.card-section{margin-bottom:12px;}
.card-section-title{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.card-section-text{font-size:13px;font-weight:600;color:#334155;line-height:1.6;}

/* OUTCOME BOXES */
.outcome-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.outcome-box{padding:10px 12px;border-radius:14px;font-size:12px;font-weight:700;line-height:1.5;}
.outcome-pos{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#991b1b;}
.outcome-neg{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);color:#14532d;}
.outcome-label{font-size:11px;font-weight:900;display:block;margin-bottom:3px;}

/* PREPARE BOX */
.prepare-box{background:rgba(14,165,233,0.06);border:1px solid rgba(14,165,233,0.15);border-radius:14px;padding:10px 12px;font-size:12px;font-weight:700;color:#0369a1;margin-bottom:12px;}

/* BOOK BUTTON */
.book-btn{display:block;width:100%;padding:12px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;font-size:14px;font-weight:900;text-align:center;text-decoration:none;font-family:'Nunito',Arial,sans-serif;border:none;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 14px rgba(14,165,233,0.3);}
.book-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(14,165,233,0.4);}

/* SYMPTOMS LIST */
.symptoms-list{list-style:none;display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.symptoms-list li{background:rgba(14,165,233,0.08);border:1px solid rgba(14,165,233,0.2);border-radius:999px;padding:3px 10px;font-size:12px;font-weight:700;color:#0369a1;}

/* NO RESULTS */
.no-results{text-align:center;padding:60px 20px;color:var(--muted);font-weight:700;font-size:15px;grid-column:1/-1;}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1>🔬 Lab Tests Guide</h1>
  <p>Mobile Lab – Mityana | Know your test before you book</p>
  <div class="hero-btns">
    <a class="hero-btn" href="index.html">🧪 Book a Test</a>
    <a class="hero-btn" href="dashboard.html">🏠 Dashboard</a>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <input class="search-box" id="searchBox" placeholder="🔍 Search test e.g. HIV, Malaria, Liver, Pregnancy..." oninput="filterCards()">
</div>

<!-- TABS -->
<div class="tabs-wrap">
  <div class="tabs" id="tabsRow">
    <button class="tab active" onclick="filterByTab(this,'all')">All Tests</button>
    <button class="tab" onclick="filterByTab(this,'blood')">🩸 Blood</button>
    <button class="tab" onclick="filterByTab(this,'infections')">🦠 Infections</button>
    <button class="tab" onclick="filterByTab(this,'urine-stool')">🧫 Urine & Stool</button>
    <button class="tab" onclick="filterByTab(this,'womens')">🌸 Women's Health</button>
    <button class="tab" onclick="filterByTab(this,'autoimmune')">🔬 Other</button>
  </div>
</div>

<div class="results-info" id="resultsInfo">Showing all 31 tests</div>

<!-- CARDS GRID -->
<div class="grid" id="cardsGrid"></div>

let activeTab = "all";
let searchTerm = "";

function renderCards(){
  const grid = document.getElementById("cardsGrid");
  grid.innerHTML = "";
  let shown = 0;

  TESTS.forEach((t, i) => {
    const matchesTab = activeTab === "all" || t.category === activeTab;
    const matchesSearch = !searchTerm ||
      t.name.toLowerCase().includes(searchTerm) ||
      t.what.toLowerCase().includes(searchTerm) ||
      t.when.some(w => w.toLowerCase().includes(searchTerm));

    if(!matchesTab || !matchesSearch) return;
    shown++;

    const symptomHtml = t.when.map(s => `<li>${s}</li>`).join("");

    const card = document.createElement("div");
    card.className = "test-card";
    card.style.animationDelay = (shown * 0.04) + "s";
    card.innerHTML = `
      <div class="card-head">
        <div class="card-icon" style="background:${t.catColor}">${t.icon}</div>
        <div>
          <div class="card-title">${t.name}</div>
          <span class="card-category" style="background:${t.catColor};color:${t.catText}">${t.catLabel}</span>
          <div class="card-price">💰 ${t.price}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-section">
          <div class="card-section-title" style="color:var(--primary)">📋 What is this test?</div>
          <div class="card-section-text">${t.what}</div>
        </div>

        <div class="card-section">
          <div class="card-section-title" style="color:var(--orange)">🚨 When should you test?</div>
          <ul class="symptoms-list">${symptomHtml}</ul>
        </div>

        <div class="prepare-box">
          <strong>⚗️ How to prepare:</strong> ${t.prepare}
        </div>

        <div class="card-section">
          <div class="card-section-title" style="color:#6b7280">📊 What the result means</div>
          <div class="outcome-row">
            <div class="outcome-box outcome-pos">
              <span class="outcome-label">🔴 IF POSITIVE</span>
              ${t.positive}
            </div>
            <div class="outcome-box outcome-neg">
              <span class="outcome-label">🟢 IF NEGATIVE</span>
              ${t.negative}
            </div>
          </div>
        </div>

        <a class="book-btn" href="index.html">🧪 Book This Test – ${t.price}</a>
      </div>
    `;
    grid.appendChild(card);
  });

  if(shown === 0){
    grid.innerHTML = `<div class="no-results">😕 No tests found for "<b>${searchTerm || activeTab}</b>"<br><br>Try a different search term.</div>`;
  }

  document.getElementById("resultsInfo").innerText =
    `Showing ${shown} of ${TESTS.length} tests` + (searchTerm ? ` matching "${searchTerm}"` : "");
}

function filterByTab(btn, tab){
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  activeTab = tab;
  renderCards();
}

function filterCards(){
  searchTerm = document.getElementById("searchBox").value.toLowerCase().trim();
  renderCards();
}

// Initial render
renderCards();
</script>
