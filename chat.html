<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Chat</title>
<link rel="stylesheet" href="styles.css">

<style>
.chat-box {
    height: 300px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 10px;
    background: #fff;
}

.message {
    margin: 5px 0;
    padding: 8px;
    border-radius: 8px;
}

.patient { background: #d1e7dd; text-align: right; }
.doctor { background: #f8d7da; text-align: left; }

.input-area {
    display: flex;
    gap: 5px;
    margin-top: 10px;
}
</style>
</head>

<body>

<h2>Chat with Doctor</h2>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
    <input type="text" id="messageInput" placeholder="Type message...">
    <input type="file" id="fileInput">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
let chat = [];

function renderChat() {
    const box = document.getElementById("chatBox");
    box.innerHTML = "";

    chat.forEach(msg => {
        const div = document.createElement("div");
        div.className = "message " + msg.sender;

        if(msg.type === "text"){
            div.innerText = msg.message;
        }
        else if(msg.type === "image"){
            div.innerHTML = `<img src="${msg.file}" width="100">`;
        }

        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("messageInput");
    const fileInput = document.getElementById("fileInput");

    if(fileInput.files.length > 0){
        const file = URL.createObjectURL(fileInput.files[0]);

        chat.push({
            sender: "patient",
            type: "image",
            file: file
        });
    } else {
        chat.push({
            sender: "patient",
            type: "text",
            message: input.value
        });
    }

    input.value = "";
    fileInput.value = "";

    renderChat();
}
</script>

</body>
</html>
