<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobile Lab Dashboard</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f4f6f9;
}

/* HEADER */

header{
background:#0369a1;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
margin:0;
}

.top-buttons button{
margin-left:10px;
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.logout{
background:#ef4444;
color:white;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
text-align:center;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card h3{
margin:10px 0;
}

.count{
font-size:30px;
font-weight:bold;
color:#0369a1;
}

/* STATUS COLORS */

.pending{
border-left:6px solid orange;
}

.success{
border-left:6px solid green;
}

.alert{
border-left:6px solid red;
}

/* QUICK ACTIONS */

.actions{
padding:20px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

.actions button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#0ea5e9;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>🧪 Mobile Lab Mityana</h2>

<div class="top-buttons">
<span id="userWelcome"></span>
<button onclick="location.href='inbox.html'">💬 Messages</button>
<button class="logout" onclick="logout()">Logout</button>
</div>

</header>

<section class="stats">

<div class="card" id="ordersCard">
<h3>🧾 Orders</h3>
<div class="count" id="ordersCount">0</div>
</div>

<div class="card pending" id="ongoingCard">
<h3>🧪 Ongoing Tests</h3>
<div class="count" id="ongoingCount">0</div>
</div>

<div class="card success" id="resultsCard">
<h3>📄 Completed Results</h3>
<div class="count" id="completedCount">0</div>
</div>

<div class="card alert" id="messagesCard">
<h3>💬 Messages</h3>
<div class="count" id="messageCount">0</div>
</div>

</section>

<section class="actions">

<button onclick="location.href='new_requests.html'">
➕ New Lab Requests
</button>

<button onclick="location.href='ongoing_tests.html'">
🔬 Track Tests
</button>

<button onclick="location.href='completed_tests.html'">
📥 View Results
</button>

<button onclick="location.href='profile.html'">
👤 Profile
</button>

</section>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyA4II_I1weZZGzP990t9UWJCXjuK932pdY",
authDomain:"mobile-lab-mityana-aeae2.firebaseapp.com",
projectId:"mobile-lab-mityana-aeae2"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userId;

/* AUTH CHECK */

auth.onAuthStateChanged(async user=>{

if(!user){
location.href="login.html";
return;
}

userId = user.uid;

/* LOAD USER NAME */

const userDoc = await db.collection("users").doc(userId).get();

let name = "User";

if(userDoc.exists){
name = userDoc.data().fullName;
}

document.getElementById("userWelcome").innerText="Hello "+name;

/* LOAD COUNTS */

db.collection("orders").get().then(snap=>{
document.getElementById("ordersCount").innerText=snap.size;
});

db.collection("ongoing_tests").get().then(snap=>{
document.getElementById("ongoingCount").innerText=snap.size;
});

db.collection("results").get().then(snap=>{
document.getElementById("completedCount").innerText=snap.size;
});

db.collection("chats")
.where("participants","array-contains",userId)
.get()
.then(snap=>{
document.getElementById("messageCount").innerText=snap.size;
});

});

/* CARD REDIRECTION */

document.getElementById("ordersCard").onclick=()=>{
location.href="new_requests.html";
};

document.getElementById("ongoingCard").onclick=()=>{
location.href="ongoing_tests.html";
};

document.getElementById("resultsCard").onclick=()=>{
location.href="completed_tests.html";
};

document.getElementById("messagesCard").onclick=()=>{
location.href="inbox.html";
};

/* LOGOUT */

function logout(){

auth.signOut().then(()=>{
location.href="login.html";
});

}

</script>

</body>
</html>
