<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobile Lab Patient Dashboard</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f1f5f9;
}

/* HEADER */
header{
background:#0369a1;
color:white;
padding:20px;
text-align:center;
position:relative;
}

#userWelcome{
display:block;
margin-top:6px;
}

/* 🔔 NOTIFICATION */
#notifBell{
position:absolute;
right:20px;
top:20px;
cursor:pointer;
font-size:22px;
}

#notifCount{
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:12px;
position:absolute;
top:-5px;
right:-10px;
}

/* 📊 STATS */
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:10px 20px;
}

.stat{
background:white;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

.stat span{
display:block;
font-size:18px;
color:#0369a1;
}

/* DASHBOARD GRID */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

/* CARD */
.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:scale(1.05);
}

/* LOGOUT */
.logout{
position:fixed;
top:20px;
right:70px;
background:#ef4444;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>🧪 Mobile Lab Mityana</h2>
<span id="userWelcome">Loading...</span>

<div id="notifBell">
🔔 <span id="notifCount" style="display:none;">0</span>
</div>

</header>

<button class="logout" onclick="logout()">Logout</button>

<!-- 📊 STATS -->
<div class="stats">
<div class="stat">Total <span id="totalOrders">0</span></div>
<div class="stat">Pending <span id="pendingOrders">0</span></div>
<div class="stat">Ongoing <span id="ongoingOrders">0</span></div>
<div class="stat">Completed <span id="completedOrders">0</span></div>
</div>

<div class="dashboard">

<div class="card" id="orderCard">
<h3>Order a Test</h3>
</div>

<div class="card" id="resultsCard">
<h3>Results</h3>
</div>

<div class="card" id="contactCard">
<h3>Contact Lab</h3>
</div>

<div class="card" id="profileCard">
<h3>Profile</h3>
</div>
  
<div class="card" id="aboutCard">
<h3>About Us</h3>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* 🔥 Firebase Init */
const firebaseConfig = {
apiKey:"AIzaSyA4II_I1weZZGzP990t9UWJCXjuK932pdY",
authDomain:"mobile-lab-mityana-aeae2.firebaseapp.com",
projectId:"mobile-lab-mityana-aeae2"
};

if(!firebase.apps.length){
firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.firestore();

/* 🔐 AUTH */
auth.onAuthStateChanged(async user=>{

if(!user){
location.href="login.html";
return;
}

/* 👤 USER NAME */
db.collection("users").doc(user.uid)
.onSnapshot(doc=>{

let name = "User";

if(doc.exists && doc.data().fullName){
name = doc.data().fullName;
}else if(user.email){
name = user.email.split("@")[0];
}

document.getElementById("userWelcome").innerText = "Welcome " + name;

});

/* 📊 STATS */
db.collection("orders")
.where("userId","==",user.uid)
.onSnapshot(snap=>{

let total=0, pending=0, ongoing=0, completed=0;

snap.forEach(d=>{
total++;

const s = d.data().status;

if(s==="pending") pending++;
if(s==="ongoing") ongoing++;
if(s==="completed") completed++;
});

totalOrders.innerText = total;
pendingOrders.innerText = pending;
ongoingOrders.innerText = ongoing;
completedOrders.innerText = completed;

});

/* 🔔 NOTIFICATIONS (UNREAD ONLY) */
db.collection("results")
.where("userId","==",user.uid)
.where("seen","==",false)
.onSnapshot(snap=>{

const count = snap.size;
const badge = document.getElementById("notifCount");

if(count > 0){
badge.style.display = "inline-block";
badge.innerText = count;
}else{
badge.style.display = "none";
}

});

});


/* 🔔 CLICK → MARK AS READ */
document.getElementById("notifBell").onclick = async ()=>{

const user = auth.currentUser;
if(!user) return;

const snap = await db.collection("results")
.where("userId","==",user.uid)
.where("seen","==",false)
.get();

const batch = db.batch();

snap.forEach(doc=>{
batch.update(doc.ref,{ seen:true });
});

await batch.commit();

location.href="inbox.html";
};


/* NAVIGATION */
orderCard.onclick=()=>location.href="index.html";
resultsCard.onclick=()=>location.href="inbox.html";
contactCard.onclick=()=>location.href="patient_chat.html";
profileCard.onclick=()=>location.href="profile.html";
aboutCard.onclick=()=>location.href="about.html";


/* 🚪 LOGOUT */
function logout(){
auth.signOut().then(()=>{
location.href="login.html";
});
}

</script>

</body>
</html>
