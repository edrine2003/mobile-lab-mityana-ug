<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobile Lab Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f1f5f9;
}

/* HEADER */

header{
background:#0369a1;
color:white;
padding:20px;
text-align:center;
}

header h2{
margin:0;
}

#userWelcome{
margin-top:5px;
display:block;
}

/* GRID */

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:30px;
}

/* CARDS */

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:70px;
margin-bottom:10px;
}

.count{
font-size:28px;
font-weight:bold;
color:#0369a1;
}

/* LOGOUT */

.logout{
position:fixed;
top:20px;
right:20px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>🧪 Mobile Lab Mityana</h2>
<span id="userWelcome">Loading...</span>

</header>

<button class="logout" onclick="logout()">Logout</button>


<div class="dashboard">

<div class="card" id="ordersCard">
<img src="icons/order.png">
<h3>Orders</h3>
<div class="count" id="ordersCount">0</div>
</div>

<div class="card" id="ongoingCard">
<img src="icons/results.png">
<h3>Ongoing Tests</h3>
<div class="count" id="ongoingCount">0</div>
</div>

<div class="card" id="resultsCard">
<img src="icons/results.png">
<h3>Results</h3>
<div class="count" id="completedCount">0</div>
</div>

<div class="card" id="profileCard">
<img src="icons/profile.png">
<h3>Profile</h3>
</div>

<div class="card" id="contactCard">
<img src="icons/contact.png">
<h3>Contact Lab</h3>
</div>

</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyA4II_I1weZZGzP990t9UWJCXjuK932pdY",
authDomain:"mobile-lab-mityana-aeae2.firebaseapp.com",
projectId:"mobile-lab-mityana-aeae2"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userId;

/* CHECK LOGIN */

auth.onAuthStateChanged(async user=>{

if(!user){
location.href="login.html";
return;
}

userId=user.uid;

/* GET USER NAME */

const doc=await db.collection("users").doc(userId).get();

let name="User";

if(doc.exists){
name=doc.data().fullName;
}

document.getElementById("userWelcome").innerText="Welcome "+name;

/* LOAD COUNTS */

db.collection("orders").get().then(snap=>{
document.getElementById("ordersCount").innerText=snap.size;
});

db.collection("ongoing_tests").get().then(snap=>{
document.getElementById("ongoingCount").innerText=snap.size;
});

db.collection("results").get().then(snap=>{
document.getElementById("completedCount").innerText=snap.size;
});

});

/* REDIRECTION */

document.getElementById("ordersCard").onclick=()=>{
location.href="new_requests.html";
};

document.getElementById("ongoingCard").onclick=()=>{
location.href="ongoing_tests.html";
};

document.getElementById("resultsCard").onclick=()=>{
location.href="completed_tests.html";
};

document.getElementById("profileCard").onclick=()=>{
location.href="profile.html";
};

document.getElementById("contactCard").onclick=()=>{
location.href="contact.html";
};

/* LOGOUT */

function logout(){

auth.signOut().then(()=>{
location.href="login.html";
});

}

</script>

</body>
</html>
