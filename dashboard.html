<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – Mobile Lab</title>
<link rel="stylesheet" href="dashboard.css">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f1f5f9;
    margin: 0;
    padding: 0;
}
header {
    background: #0369a1;
    color: white;
    padding: 20px;
    text-align: center;
}
h1 {
    margin: 0;
}
.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 20px;
    padding: 20px;
}
.card {
    background: #fff;
    border-radius: 12px;
    text-align: center;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: transform 0.2s;
}
.card:hover {
    transform: translateY(-5px);
}
.card img {
    width: 64px;
    height: 64px;
    margin-bottom: 12px;
}
.card h3 {
    margin: 8px 0 0 0;
    color: #0369a1;
}
.card p {
    margin: 5px 0 0 0;
    color: #333;
}
</style>
</head>
<body>

<header>
  <h1>🧪 Mobile Lab Dashboard</h1>
</header>

<div class="dashboard">
  <!-- Orders Card -->
  <div class="card">
    <img src="icons/order.png" alt="Orders">
    <h3>Orders</h3>
    <p>View and create lab orders</p>
  </div>

  <!-- Results Card -->
  <div class="card">
    <img src="icons/results.png" alt="Results">
    <h3>Results</h3>
    <p>Check completed lab results</p>
  </div>

  <!-- Profile Card -->
  <div class="card">
    <img src="icons/profile.png" alt="Profile">
    <h3>Profile</h3>
    <p>Update your personal info</p>
  </div>

  <!-- Contact Card -->
  <div class="card">
    <img src="icons/contact.png" alt="Contact">
    <h3>Contact</h3>
    <p>Get in touch with support</p>
  </div>
</div>

</body>
</html>
