<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobile Lab Patient Dashboard</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f1f5f9;
}

/* HEADER */

header{
background:#0369a1;
color:white;
padding:20px;
text-align:center;
}

header h2{
margin:0;
}

#userWelcome{
display:block;
margin-top:6px;
}

/* DASHBOARD GRID */

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

/* CARD STYLE */

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:70px;
margin-bottom:10px;
}

.card h3{
margin:0;
color:#0369a1;
}

/* LOGOUT BUTTON */

.logout{
position:fixed;
top:20px;
right:20px;
background:#ef4444;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>🧪 Mobile Lab Mityana</h2>
<span id="userWelcome">Loading...</span>

</header>

<button class="logout" onclick="logout()">Logout</button>


<div class="dashboard">

<div class="card" id="orderCard">
<img src="icons/order.png">
<h3>Order a Test</h3>
</div>

<div class="card" id="resultsCard">
<img src="icons/results.png">
<h3>Results</h3>
</div>

<div class="card" id="contactCard">
<img src="icons/contact.png">
<h3>Contact Lab</h3>
</div>

<div class="card" id="profileCard">
<img src="icons/profile.png">
<h3>Profile</h3>
</div>
  
<div class="card" id="aboutCard">
<img src="icons/about.png">
<h3>About Us</h3>
</div>

</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {

apiKey:"AIzaSyA4II_I1weZZGzP990t9UWJCXjuK932pdY",
authDomain:"mobile-lab-mityana-aeae2.firebaseapp.com",
projectId:"mobile-lab-mityana-aeae2"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* CHECK LOGIN */

auth.onAuthStateChanged(async user=>{

if(!user){

location.href="login.html";
return;

}

const doc = await db.collection("users").doc(user.uid).get();

let name="User";

if(doc.exists){

name = doc.data().fullName;

}

document.getElementById("userWelcome").innerText="Welcome "+name;

});

/* DASHBOARD REDIRECTS */

document.getElementById("orderCard").onclick=()=>{

location.href="index.html";

};

document.getElementById("resultsCard").onclick=()=>{

location.href="inbox.html";

};

document.getElementById("contactCard").onclick=()=>{

location.href="patient_chat.html";

};
document.getElementById("aboutCard").onclick=()=>{

location.href="about.html";
  
};
document.getElementById("profileCard").onclick=()=>{

location.href="profile.html";

};

/* LOGOUT */

function logout(){

auth.signOut().then(()=>{

location.href="login.html";

});

}

</script>

</body>

</html>
