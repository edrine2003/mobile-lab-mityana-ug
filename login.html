<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Mobile Lab Mityana</title>
<meta name="theme-color" content="#0ea5e9">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--primary:#0ea5e9;--primary2:#14b8a6;--dark:#0f172a;--muted:#64748b;--border:rgba(15,23,42,0.12);}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',Arial,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#0ea5e9,#14b8a6,#10b981);
  background-size:300% 300%;
  animation:gradShift 8s ease infinite;
  display:flex;align-items:center;justify-content:center;
  padding:20px;position:relative;overflow:hidden;
}
@keyframes gradShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

/* Background blobs */
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(80px);opacity:0.3;pointer-events:none;}
body::before{width:400px;height:400px;background:radial-gradient(circle,#0ea5e9,transparent);top:-80px;left:-80px;animation:blob1 12s ease-in-out infinite alternate;}
body::after{width:350px;height:350px;background:radial-gradient(circle,#14b8a6,transparent);bottom:-60px;right:-60px;animation:blob2 10s ease-in-out infinite alternate;}
@keyframes blob1{0%{transform:translate(0,0);}100%{transform:translate(40px,30px);}}
@keyframes blob2{0%{transform:translate(0,0);}100%{transform:translate(-40px,-30px);}}

/* CARD */
.card{
  width:100%;max-width:420px;
  background:rgba(255,255,255,0.97);
  border-radius:28px;
  box-shadow:0 24px 60px rgba(2,6,23,0.2);
  overflow:hidden;
  animation:cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  position:relative;z-index:1;
}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(0.96);}to{opacity:1;transform:none;}}

/* HERO */
.hero{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  background-size:300% 300%;animation:gradShift 8s ease infinite;
  padding:28px 24px 24px;text-align:center;color:#fff;position:relative;overflow:hidden;
}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.08);}
.hero h2{font-size:22px;font-weight:900;margin:0 0 6px;letter-spacing:-0.3px;}
.hero p{font-size:13px;opacity:0.9;font-weight:600;margin:3px 0;}
.hero-contact{
  display:inline-flex;align-items:center;gap:6px;margin-top:10px;
  background:rgba(255,255,255,0.18);border-radius:999px;
  padding:6px 14px;font-size:12px;font-weight:700;
  border:1px solid rgba(255,255,255,0.3);
}

/* FORM */
.form{padding:24px;}
.form-title{font-size:18px;font-weight:900;color:var(--dark);margin-bottom:20px;text-align:center;}

.field{margin-bottom:16px;}
.field label{font-size:13px;font-weight:800;color:var(--dark);display:block;margin-bottom:6px;}
.input-wrap{position:relative;}
.input-wrap input{
  width:100%;padding:13px 44px 13px 14px;
  border-radius:14px;border:1.5px solid var(--border);
  font-family:'Nunito',Arial,sans-serif;font-size:14px;font-weight:600;
  color:var(--dark);background:#f8fafc;outline:none;transition:all 0.2s;
}
.input-wrap input:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(14,165,233,0.12);
  background:#fff;
}
.input-icon{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-size:16px;cursor:pointer;color:var(--muted);user-select:none;
  transition:color 0.2s;
}
.input-icon:hover{color:var(--primary);}

/* REMEMBER + FORGOT */
.row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.remember{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--dark);cursor:pointer;}
.remember input{width:auto;margin:0;accent-color:var(--primary);}
.forgot{font-size:13px;font-weight:800;color:var(--primary);text-decoration:none;transition:opacity 0.2s;}
.forgot:hover{opacity:0.7;}

/* LOGIN BUTTON */
.login-btn{
  width:100%;padding:15px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:#fff;font-size:16px;font-weight:900;cursor:pointer;
  font-family:'Nunito',Arial,sans-serif;
  box-shadow:0 8px 24px rgba(14,165,233,0.35);
  transition:all 0.25s;position:relative;overflow:hidden;
}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(14,165,233,0.45);}
.login-btn:active{transform:translateY(0);}
.login-btn:disabled{opacity:0.7;cursor:not-allowed;transform:none;}
.login-btn .btn-text{transition:opacity 0.2s;}
.login-btn .btn-spinner{
  display:none;width:20px;height:20px;border-radius:50%;
  border:3px solid rgba(255,255,255,0.4);border-top-color:#fff;
  animation:spin 0.7s linear infinite;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg);}}
.login-btn.loading .btn-text{display:none;}
.login-btn.loading .btn-spinner{display:block;}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;}
.divider hr{flex:1;border:none;border-top:1px solid var(--border);}
.divider span{font-size:12px;font-weight:700;color:var(--muted);}

/* GOOGLE BTN */
.google-btn{
  width:100%;padding:13px;border:1.5px solid var(--border);border-radius:14px;
  background:#fff;font-family:'Nunito',Arial,sans-serif;font-size:14px;font-weight:800;
  color:var(--dark);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all 0.2s;
}
.google-btn:hover{background:#f8fafc;border-color:rgba(14,165,233,0.3);transform:translateY(-1px);}
.google-icon{width:20px;height:20px;}

/* MSG */
.msg{
  text-align:center;font-size:13px;font-weight:700;
  margin-top:14px;padding:10px 14px;border-radius:12px;
  display:none;
}
.msg.success{background:rgba(34,197,94,0.1);color:#15803d;display:block;}
.msg.error{background:rgba(239,68,68,0.08);color:#b91c1c;display:block;}

/* FOOTER */
.footer{
  text-align:center;font-size:13px;color:var(--muted);
  padding:16px 24px 20px;font-weight:600;
}
.footer a{color:var(--primary);text-decoration:none;font-weight:800;}
.footer a:hover{text-decoration:underline;}

/* FORGOT MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:#fff;border-radius:24px;padding:28px 24px;width:100%;max-width:380px;
  transform:scale(0.9);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-overlay.open .modal{transform:scale(1);}
.modal h3{font-size:18px;font-weight:900;color:var(--dark);margin-bottom:8px;}
.modal p{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:16px;}
.modal input{
  width:100%;padding:13px 14px;border-radius:14px;border:1.5px solid var(--border);
  font-family:'Nunito',Arial,sans-serif;font-size:14px;font-weight:600;
  color:var(--dark);background:#f8fafc;outline:none;margin-bottom:14px;
}
.modal input:focus{border-color:var(--primary);}
.modal-btn{
  width:100%;padding:13px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:#fff;font-size:15px;font-weight:900;cursor:pointer;
  font-family:'Nunito',Arial,sans-serif;margin-bottom:10px;
}
.modal-cancel{
  width:100%;padding:11px;border:1.5px solid var(--border);border-radius:14px;
  background:#fff;font-size:14px;font-weight:800;cursor:pointer;
  color:var(--muted);font-family:'Nunito',Arial,sans-serif;
}
</style>
</head>
<body>

<!-- FORGOT PASSWORD MODAL -->
<div class="modal-overlay" id="forgotModal">
  <div class="modal">
    <h3>🔐 Reset Password</h3>
    <p>Enter your email and we'll send you a reset link.</p>
    <input type="email" id="resetEmail" placeholder="Your email address">
    <div class="msg" id="resetMsg"></div>
    <button class="modal-btn" onclick="sendReset()">📧 Send Reset Link</button>
    <button class="modal-cancel" onclick="closeForgot()">Cancel</button>
  </div>
</div>

<!-- CARD -->
<div class="card">

  <!-- HERO -->
  <div class="hero">
    <img src="lab-bg.jpg" alt="Mobile Lab Mityana" style="width:100%;max-height:180px;object-fit:cover;border-radius:16px;margin-bottom:14px;box-shadow:0 8px 20px rgba(0,0,0,0.2);">
    <h2>Mobile Lab – Mityana</h2>
    <p>Quality Diagnostics • Trusted Results</p>
    <div class="hero-contact">📞 0750 992 939 &nbsp;|&nbsp; 0778 379 791</div>
  </div>

  <!-- FORM -->
  <div class="form">
    <div class="form-title">Welcome Back 👋</div>

    <div class="field">
      <label for="email">Email Address</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
        <span class="input-icon">✉️</span>
      </div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        <span class="input-icon" id="togglePwd" onclick="togglePassword()" title="Show/hide password">👁</span>
      </div>
    </div>

    <div class="row-between">
      <label class="remember">
        <input type="checkbox" id="rememberMe"> Remember me
      </label>
      <a class="forgot" href="#" onclick="openForgot(); return false;">Forgot password?</a>
    </div>

    <button class="login-btn" id="loginBtn" onclick="login()">
      <span class="btn-text">🔐 Login</span>
      <div class="btn-spinner"></div>
    </button>

    <div class="msg" id="msg"></div>

    <div class="divider"><hr><span>or continue with</span><hr></div>

    <button class="google-btn" onclick="loginGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    New patient? <a href="register.html">Create an account</a><br>
    <span style="font-size:11px;margin-top:4px;display:block;">Serving Mityana &amp; nearby areas 🏥</span>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA4II_I1weZZGzP990t9UWJCXjuK932pdY",
  authDomain: "mobile-lab-mityana-aeae2.firebaseapp.com",
  projectId: "mobile-lab-mityana-aeae2",
  storageBucket: "mobile-lab-mityana-aeae2.firebasestorage.app",
  messagingSenderId: "624002906588",
  appId: "1:624002906588:web:08b4259f90ffa9adad7719"
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ── If already logged in, redirect ──
auth.onAuthStateChanged(async user => {
  if(user) await redirect(user);
});

// ── REDIRECT based on role ──
async function redirect(user){
  try{
    const snap = await db.collection("users").doc(user.uid).get();
    if(snap.exists && snap.data().role === "admin"){
      window.location.href = "new_requests.html";
    } else {
      window.location.href = "dashboard.html";
    }
  } catch(e){
    window.location.href = "dashboard.html";
  }
}

// ── LOGIN ──
async function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const btn = document.getElementById("loginBtn");
  const msg = document.getElementById("msg");

  if(!email || !password){
    showMsg("Please enter your email and password", "error");
    return;
  }

  btn.classList.add("loading");
  btn.disabled = true;
  msg.className = "msg";

  try{
    const cred = await auth.signInWithEmailAndPassword(email, password);
    const user = cred.user;

    // Auto-create Firestore profile if missing
    const ref = db.collection("users").doc(user.uid);
    const snap = await ref.get();
    if(!snap.exists){
      await ref.set({
        email: user.email,
        role: "user",
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    // Remember me
    if(document.getElementById("rememberMe").checked){
      await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    }

    showMsg("✅ Login successful! Redirecting...", "success");
    setTimeout(() => redirect(user), 900);

  } catch(err){
    btn.classList.remove("loading");
    btn.disabled = false;
    const msgs = {
      "auth/user-not-found": "No account found with this email.",
      "auth/wrong-password": "Incorrect password. Try again.",
      "auth/invalid-email": "Please enter a valid email address.",
      "auth/too-many-requests": "Too many attempts. Please try again later.",
      "auth/invalid-credential": "Incorrect email or password."
    };
    showMsg(msgs[err.code] || err.message, "error");
  }
}

// ── GOOGLE LOGIN ──
async function loginGoogle(){
  const provider = new firebase.auth.GoogleAuthProvider();
  try{
    const result = await auth.signInWithPopup(provider);
    const user = result.user;
    const ref = db.collection("users").doc(user.uid);
    const snap = await ref.get();
    if(!snap.exists){
      await ref.set({
        email: user.email,
        fullName: user.displayName || "",
        photoURL: user.photoURL || "",
        role: "user",
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    showMsg("✅ Signed in with Google!", "success");
    setTimeout(() => redirect(user), 900);
  } catch(err){
    if(err.code !== "auth/popup-closed-by-user"){
      showMsg(err.message, "error");
    }
  }
}

// ── SHOW/HIDE PASSWORD ──
function togglePassword(){
  const pwd = document.getElementById("password");
  const icon = document.getElementById("togglePwd");
  if(pwd.type === "password"){
    pwd.type = "text";
    icon.innerText = "🙈";
  } else {
    pwd.type = "password";
    icon.innerText = "👁";
  }
}

// ── ENTER KEY ──
document.addEventListener("keydown", e => {
  if(e.key === "Enter") login();
});

// ── FORGOT PASSWORD ──
function openForgot(){
  document.getElementById("forgotModal").classList.add("open");
  const emailVal = document.getElementById("email").value;
  if(emailVal) document.getElementById("resetEmail").value = emailVal;
}
function closeForgot(){
  document.getElementById("forgotModal").classList.remove("open");
  document.getElementById("resetMsg").className = "msg";
}
document.getElementById("forgotModal").addEventListener("click", e => {
  if(e.target === e.currentTarget) closeForgot();
});

async function sendReset(){
  const email = document.getElementById("resetEmail").value.trim();
  const resetMsg = document.getElementById("resetMsg");
  if(!email){
    resetMsg.className = "msg error";
    resetMsg.innerText = "Enter your email address";
    return;
  }
  try{
    await auth.sendPasswordResetEmail(email);
    resetMsg.className = "msg success";
    resetMsg.innerText = "✅ Reset link sent! Check your email.";
    setTimeout(() => closeForgot(), 2500);
  } catch(err){
    resetMsg.className = "msg error";
    resetMsg.innerText = err.code === "auth/user-not-found"
      ? "No account found with this email."
      : err.message;
  }
}

// ── HELPER ──
function showMsg(text, type){
  const msg = document.getElementById("msg");
  msg.innerText = text;
  msg.className = "msg " + type;
}
</script>
</body>
</html>
